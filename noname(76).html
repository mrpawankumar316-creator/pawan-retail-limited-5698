<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pawan Retail Limited • Premium Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .mobile-frame {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            background: #f8fafc;
            min-height: 95vh;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border-radius: 32px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .animate-fade { animation: fadeInUp 0.3s ease forwards; }
        .animate-slide { animation: slideIn 0.3s ease forwards; }

        /* Login Screen */
        .login-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-radius: 32px;
            transition: opacity 0.3s ease;
        }
        .login-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            animation: fadeInUp 0.4s ease;
        }
        .login-card h2 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 2px solid #f0f0f0;
            border-radius: 30px;
            font-size: 14px;
            background: #fafafa;
        }
        .login-card input:focus { outline: none; border-color: #D4AF37; }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
        .switch-link { color: #D4AF37; cursor: pointer; font-weight: 600; margin-top: 8px; display: inline-block; }

        /* OTP Boxes */
        .otp-boxes { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .otp-box {
            width: 48px; height: 54px; text-align: center; font-size: 22px; font-weight: 700;
            border: 2px solid #e0e0e0; border-radius: 12px; background: white;
        }
        .otp-box:focus { outline: none; border-color: #D4AF37; }

        /* App Container */
        .app-container { background: #f8fafc; min-height: 95vh; position: relative; display: none; }
        .app-container.show { display: block; }

        /* Header */
        .premium-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #D4AF37);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            animation: shimmer 2s infinite;
        }
        .menu-icon {
            background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 20px; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .content-area { padding: 16px; background: #f8fafc; min-height: 450px; }

        .premium-card {
            background: white; border-radius: 20px; padding: 16px; margin-bottom: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(212, 175, 55, 0.15);
            transition: all 0.2s; cursor: pointer;
        }
        .premium-card:active { transform: scale(0.98); }

        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700;
            margin-bottom: 10px;
        }
        .badge-hot { background: linear-gradient(135deg, #FF6B6B, #EE5A24); color: white; }
        .badge-cinema { background: linear-gradient(135deg, #8E44AD, #9B59B6); color: white; }

        .offer-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
        .offer-price { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #1a1a2e, #D4AF37); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 8px 0; }
        .offer-timer {
            font-size: 12px; color: #e74c3c; background: #fff3e0; display: inline-block;
            padding: 4px 12px; border-radius: 20px; margin-top: 8px;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 14px;
            font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a2e; }
        .btn-secondary { background: #f0f0f0; color: #1a1a2e; border: 1px solid #e0e0e0; }
        .btn-cancel { background: #fee2e2; color: #dc2626; }

        .input-field {
            width: 100%; padding: 12px 16px; border: 2px solid #f0f0f0; border-radius: 40px;
            font-size: 14px; margin: 8px 0; background: #fafafa;
        }
        .input-field:focus { outline: none; border-color: #D4AF37; }

        .banner-container { margin-bottom: 16px; border-radius: 20px; overflow: hidden; }
        .banner-item {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            padding: 25px 20px; text-align: center; color: white;
        }

        .order-card {
            background: white; border-radius: 20px; padding: 14px; margin-bottom: 12px;
            border-left: 4px solid #D4AF37; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer; transition: all 0.2s;
        }
        .order-card:active { transform: scale(0.98); }

        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-confirmed { background: #e3f2fd; color: #2196f3; }
        .status-processing { background: #f3e5f5; color: #9c27b0; }
        .status-out { background: #fff8e1; color: #ffc107; }
        .status-delivered { background: #e8f5e9; color: #4caf50; }

        /* Order Timeline */
        .order-timeline {
            display: flex; flex-direction: column; margin: 20px 0; position: relative;
        }
        .timeline-step {
            display: flex; align-items: center; margin-bottom: 20px; position: relative;
        }
        .timeline-step:not(:last-child)::before {
            content: ''; position: absolute; left: 20px; top: 40px; width: 2px; height: 30px;
            background: #e0e0e0; transition: all 0.5s;
        }
        .timeline-step.completed:not(:last-child)::before { background: #4caf50; }
        .timeline-step.active .step-dot { background: #4caf50; color: white; animation: pulse 1s infinite; }
        .step-dot {
            width: 40px; height: 40px; border-radius: 50%; background: white; border: 2px solid #e0e0e0;
            display: flex; align-items: center; justify-content: center; margin-right: 16px;
            font-weight: bold; z-index: 2; transition: all 0.3s;
        }
        .step-content { flex: 1; }
        .step-title { font-weight: 700; font-size: 14px; }
        .step-time { font-size: 10px; color: #7f8c8d; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Menu Sidebar */
        .menu-sidebar {
            position: absolute; top: 0; left: -280px; width: 280px; height: 100%;
            background: white; z-index: 200; transition: left 0.3s ease;
            padding: 20px; border-radius: 0 20px 20px 0;
        }
        .menu-sidebar.open { left: 0; }
        .menu-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 150; display: none; border-radius: 32px;
        }
        .menu-overlay.show { display: block; }
        .menu-item {
            background: #fafafa; border-radius: 16px; padding: 12px; margin-bottom: 12px;
            cursor: pointer; text-align: center;
        }
        .menu-header { text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #D4AF37; }

        .flex-between { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .price-breakdown { background: #f8f9fa; padding: 15px; border-radius: 20px; margin: 12px 0; }
        .total-amount { font-size: 20px; font-weight: 800; color: #D4AF37; border-top: 2px dashed #e0e0e0; padding-top: 12px; margin-top: 8px; }

        .center-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5000; background: white; border-radius: 24px; padding: 20px;
            text-align: center; min-width: 260px; animation: fadeInUp 0.3s ease;
        }
        .center-popup button {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border: none; padding: 8px 20px; border-radius: 30px; margin-top: 12px; cursor: pointer;
        }

        .payment-methods-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 15px 0;
        }
        .payment-method-card {
            background: #f8f9fa; border-radius: 16px; padding: 12px; text-align: center;
            cursor: pointer; border: 1px solid #e0e0e0;
        }
        .qr-container {
            text-align: center; padding: 15px; background: white; border-radius: 20px;
            margin: 12px 0; cursor: pointer; border: 2px dashed #D4AF37;
        }

        .movie-ticket-page { background: white; border-radius: 20px; padding: 20px; }
        .movie-ticket-page h2 { color: #D4AF37; margin-bottom: 16px; }
        .theatre-info { background: #f0f0f0; border-radius: 16px; padding: 12px; margin: 12px 0; text-align: center; }
        .time-slots { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
        .time-slot { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 30px; cursor: pointer; font-size: 12px; }
        .time-slot.selected { background: #D4AF37; color: white; }
        .date-card { flex: 1; text-align: center; padding: 10px; border: 1px solid #e0e0e0; border-radius: 12px; cursor: pointer; }
        .date-card.selected { background: #D4AF37; color: white; }

        .complaint-item {
            background: #f8f9fa; border-radius: 16px; padding: 12px; margin-bottom: 10px;
            border-left: 3px solid #ff9800;
        }
    </style>
</head>
<body>

<div class="mobile-frame">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2>🏪 PAWAN RETAIL</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="handleLogin()">Login</button>
                <div class="switch-link" onclick="showSignup()">New user? Create Account</div>
            </div>
            <div id="signupForm" style="display:none">
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email Address">
                <input type="tel" id="signupMobile" placeholder="Mobile Number (10 digits)">
                <button onclick="sendSignupOTP()">Send OTP</button>
                <div id="signupOtpDiv" style="display:none; margin-top:15px;">
                    <div class="otp-boxes">
                        <input type="text" class="otp-box" id="otp0" maxlength="1" inputmode="numeric" oninput="moveNext(0, event)" onkeydown="movePrev(0, event)">
                        <input type="text" class="otp-box" id="otp1" maxlength="1" inputmode="numeric" oninput="moveNext(1, event)" onkeydown="movePrev(1, event)">
                        <input type="text" class="otp-box" id="otp2" maxlength="1" inputmode="numeric" oninput="moveNext(2, event)" onkeydown="movePrev(2, event)">
                        <input type="text" class="otp-box" id="otp3" maxlength="1" inputmode="numeric" oninput="moveNext(3, event)" onkeydown="movePrev(3, event)">
                        <input type="text" class="otp-box" id="otp4" maxlength="1" inputmode="numeric" oninput="moveNext(4, event)" onkeydown="movePrev(4, event)">
                        <input type="text" class="otp-box" id="otp5" maxlength="1" inputmode="numeric" oninput="moveNext(5, event)" onkeydown="movePrev(5, event)">
                    </div>
                    <button class="btn btn-primary" style="margin-top:15px;" onclick="verifySignupOTP()">Verify & Register</button>
                </div>
                <div class="switch-link" onclick="showLogin()" style="margin-top:10px;">Back to Login</div>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="app-container">
        <div id="dynamicPage">
            <div style="text-align:center; padding:40px;">Loading...</div>
        </div>
    </div>

    <!-- Menu Sidebar -->
    <div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>
    <div id="menuSidebar" class="menu-sidebar">
        <div class="menu-header">
            <div style="font-size: 40px;">👤</div>
            <div id="menuName" style="font-weight: 800;">User</div>
            <div id="menuPoints" style="font-size: 12px; color: #D4AF37;">⭐ 0 pts</div>
        </div>
        <div class="menu-item" onclick="showHome(); closeMenu()">🏠 Home</div>
        <div class="menu-item" onclick="showOrders(); closeMenu()">📦 My Orders</div>
        <div class="menu-item" onclick="showPRLCoins(); closeMenu()">🪙 PRL Coins</div>
        <div class="menu-item" onclick="showComplaints(); closeMenu()">📢 Complaints</div>
        <div class="menu-item" onclick="showProfile(); closeMenu()">👤 Profile</div>
        <div class="menu-item" onclick="showAboutUs(); closeMenu()">ℹ️ About Us</div>
        <div class="menu-item" style="background: #fee2e2;" onclick="logout()">🚪 Logout</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzgIrjcWwnqS5e3lDplptyU6VDSngn7_o",
        authDomain: "pawan-8388d.firebaseapp.com",
        projectId: "pawan-8388d",
        storageBucket: "pawan-8388d.firebasestorage.app",
        messagingSenderId: "522473603051",
        appId: "1:522473603051:web:519543c829c1eefd1523ae"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    emailjs.init("3cUWXrfL9AhSkM5FA");
    
    let currentUser = null, userData = null, selectedOffer = null;
    let appliedCoupon = null;
    let usePRLCoins = false;
    let selectedCoinPercent = 0;
    let movieDetails = null;
    let pendingSignup = null, pendingOtp = null;
    
    const timeSlots = ["10:00 AM", "1:00 PM", "4:00 PM", "7:00 PM"];
    const theatreInfo = { name: "🎬 PVR Cinemas - Bokaro", address: "The Bokaro Mall, Sector 3C" };
    
    const statusFlow = [
        { name: "pending", display: "🟡 Order Placed", time: "Just now" },
        { name: "confirmed", display: "✅ Order Confirmed", time: "10-20 min" },
        { name: "processing", display: "🍳 Preparing Your Food", time: "20-30 min" },
        { name: "out_for_delivery", display: "🚚 Out for Delivery", time: "30-40 min" },
        { name: "delivered", display: "🎉 Delivered! 🎉", time: "40-45 min" }
    ];
    
    function showPopup(title, message) {
        let existing = document.querySelector('.center-popup');
        if (existing) existing.remove();
        let popup = document.createElement('div');
        popup.className = 'center-popup';
        popup.innerHTML = `<h3 style="color:#D4AF37;">${title}</h3><p>${message}</p><button onclick="this.parentElement.remove()">OK</button>`;
        document.body.appendChild(popup);
        setTimeout(() => { if(popup) popup.remove(); }, 3000);
    }
    
    function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    
    async function sendOTPEmail(email, otp) {
        try {
            await emailjs.send("Pawanretaillimited-5678", "template_45qu30j", { to_email: email, otp: otp });
            return true;
        } catch(e) { return false; }
    }
    
    async function loadUserData() {
        if (!currentUser) return;
        try {
            let docSnap = await db.collection("users").doc(currentUser.uid).get();
            if (docSnap.exists) {
                userData = docSnap.data();
            } else {
                userData = { name: "User", email: currentUser.email, prlCoins: 500, address: {} };
                await db.collection("users").doc(currentUser.uid).set(userData);
            }
            document.getElementById('menuName').innerHTML = userData.name || "User";
            document.getElementById('menuPoints').innerHTML = `⭐ ${userData.prlCoins || 0} pts`;
        } catch(e) { console.error("Load user error:", e); }
    }
    
    async function seedData() {
        try {
            let off = await db.collection("offers").get();
            if (off.empty) {
                let expiryTime = new Date();
                expiryTime.setHours(expiryTime.getHours() + 24);
                await db.collection("offers").add({ title: "🍕 3 Classic Pizzas", price: 141, badge: "HOT", type: "food", expiryTime: expiryTime });
                await db.collection("offers").add({ title: "🎬 Pushpa 2 - Movie Ticket", price: 299, badge: "CINEMA", type: "movie", expiryTime: expiryTime });
                console.log("✅ Offers added");
            }
            let cp = await db.collection("coupons").get();
            if (cp.empty) {
                await db.collection("coupons").add({ code: "SAVE50", discount: 50, usedBy: [] });
                console.log("✅ Coupons added");
            }
            let gc = await db.collection("giftCards").get();
            if (gc.empty) {
                await db.collection("giftCards").add({ code: "PRL100", points: 100, usedBy: [] });
                console.log("✅ Gift cards added");
            }
        } catch(e) { console.error("Seed error:", e); }
    }
    
    function toggleMenu() {
        document.getElementById('menuSidebar').classList.add('open');
        document.getElementById('menuOverlay').classList.add('show');
    }
    function closeMenu() {
        document.getElementById('menuSidebar').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('show');
    }
    
    function getTimeLeft(expiryTime) {
        if (!expiryTime) return "Limited offer!";
        let now = new Date();
        let expiry = expiryTime.toDate ? expiryTime.toDate() : new Date(expiryTime);
        let diff = expiry - now;
        if (diff <= 0) return "Expired";
        let hours = Math.floor(diff / (1000 * 60 * 60));
        let minutes = Math.floor((diff % (3600000)) / (1000 * 60));
        let seconds = Math.floor((diff % (60000)) / 1000);
        return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }
    
    function startTimerForOffers() {
        setInterval(async () => {
            let offersSnap = await db.collection("offers").get();
            offersSnap.forEach(doc => {
                let data = doc.data();
                if (data.expiryTime) {
                    let timerElem = document.getElementById(`timer_${doc.id}`);
                    if (timerElem) {
                        timerElem.innerText = getTimeLeft(data.expiryTime);
                    }
                }
            });
        }, 1000);
    }
    
    function getNextThreeDays() {
        let days = [];
        let today = new Date();
        for (let i = 0; i < 3; i++) {
            let date = new Date();
            date.setDate(today.getDate() + i);
            days.push({ dateStr: date.toISOString().split('T')[0], dayName: date.toLocaleDateString('en-IN', { weekday: 'short' }), dateNum: date.getDate() });
        }
        return days;
    }
    
    function calculateFinalAmount() {
        let base = selectedOffer ? selectedOffer.price : 0;
        let discount = appliedCoupon ? appliedCoupon.discount : 0;
        let maxCoinDiscount = Math.floor(base * 0.15);
        let coinDiscount = usePRLCoins ? Math.min(Math.floor(base * selectedCoinPercent / 100), maxCoinDiscount, userData?.prlCoins || 0) : 0;
        return Math.max(0, base - discount - coinDiscount);
    }
    
    // ========== HOME PAGE ==========
    async function showHome() {
        await loadUserData();
        let offersSnap = await db.collection("offers").get();
        let offersList = [];
        offersSnap.forEach(doc => offersList.push({ id: doc.id, ...doc.data() }));
        
        let html = `
            <div class="premium-header">
                <div class="header-top">
                    <div class="logo">PAWAN<span>RETAIL LIMITED</span></div>
                    <div class="menu-icon" onclick="toggleMenu()">☰</div>
                </div>
            </div>
            <div class="content-area">
                <div class="banner-container"><div class="banner-item"><h3>🔥 Special Offers!</h3><p>Limited time deals</p></div></div>
                <h3 style="color:#D4AF37; margin-bottom:12px;">✨ Hot Offers</h3>
        `;
        for (let o of offersList) {
            let badgeClass = o.badge === 'HOT' ? 'badge-hot' : 'badge-cinema';
            let timeLeft = getTimeLeft(o.expiryTime);
            html += `
                <div class="premium-card animate-slide" onclick="selectOffer('${o.id}', '${o.title}', ${o.price}, '${o.type}')">
                    <span class="badge ${badgeClass}">${o.badge}</span>
                    <div class="offer-title">${o.title}</div>
                    <div class="offer-price">₹${o.price}</div>
                    <div class="offer-timer" id="timer_${o.id}">⏱️ ${timeLeft}</div>
                    <button class="btn btn-primary" onclick="event.stopPropagation(); selectOffer('${o.id}', '${o.title}', ${o.price}, '${o.type}')">Order Now →</button>
                </div>
            `;
        }
        html += `</div>`;
        document.getElementById('dynamicPage').innerHTML = html;

    window.placeOrder = async function(finalAmount, isFree) {
        if (!isFree) {
            let txnId = document.getElementById('transactionId').value.trim();
            if (!txnId || !/^\d{12}$/.test(txnId)) {
                showPopup("Error", "Valid 12-digit Transaction ID required");
                return;
            }
        }
        try {
            if (appliedCoupon) {
                await db.collection("coupons").doc(appliedCoupon.docId).update({ usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            }
            let coinUsed = 0;
            if (usePRLCoins && selectedCoinPercent > 0) {
                let maxDiscount = Math.floor(selectedOffer.price * selectedCoinPercent / 100);
                let discountCap = Math.min(maxDiscount, userData?.prlCoins || 0, Math.floor(selectedOffer.price * 0.15));
                coinUsed = discountCap;
                await db.collection("users").doc(currentUser.uid).update({ prlCoins: (userData?.prlCoins || 0) - coinUsed });
                userData.prlCoins -= coinUsed;
            }
            let orderId = "ORD" + Date.now();
            await db.collection("users").doc(currentUser.uid).collection("orders").add({
                orderId, offerTitle: selectedOffer.title, finalAmount,
                couponUsed: appliedCoupon?.code || null, prlCoinsUsed: coinUsed,
                transactionId: isFree ? "FREE" : document.getElementById('transactionId').value,
                status: "pending", orderDate: new Date(),
                type: selectedOffer.type,
                movieDetails: selectedOffer.type === 'movie' ? movieDetails : null,
                address: selectedOffer.type === 'movie' ? null : userData.address
            });
            let pointsEarned = Math.floor(finalAmount * 0.05);
            if (pointsEarned > 0) {
                await db.collection("users").doc(currentUser.uid).update({ prlCoins: (userData?.prlCoins || 0) + pointsEarned });
            }
            showPopup("Order Placed!", `✅ Order ID: ${orderId.slice(0,12)}`);
            appliedCoupon = null; usePRLCoins = false; selectedCoinPercent = 0;
            showOrders();
        } catch(e) { showPopup("Error", e.message); }
    };

            <div class="content-area">
                <div class="premium-card"><h3 style="color:#D4AF37;">👤 Profile</h3><input class="input-field" id="profileName" placeholder="Name" value="${userData?.name || ''}"><div><strong>Email:</strong> ${currentUser?.email}</div><button class="btn btn-primary" onclick="updateProfileName()">Save</button></div>
                <div class="premium-card"><h3>📍 Address</h3><input class="input-field" id="aFlat" placeholder="Flat" value="${addr.flat || ''}"><input class="input-field" id="aStreet" placeholder="Street" value="${addr.street || ''}"><input class="input-field" id="aCity" placeholder="City" value="${addr.city || ''}"><input class="input-field" id="aPincode" placeholder="Pincode" value="${addr.pincode || ''}"><button class="btn btn-primary" onclick="updateProfileAddress()">Save</button></div>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        `;
    }
    
    window.updateProfileName = async function() {
        let name = document.getElementById('profileName').value.trim();
        if (name) { await db.collection("users").doc(currentUser.uid).update({ name }); showPopup("Success", "Profile updated!"); showProfile(); }
    };
    
    window.updateProfileAddress = async function() {
        let flat = document.getElementById('aFlat').value.trim(), street = document.getElementById('aStreet').value.trim(), city = document.getElementById('aCity').value.trim(), pincode = document.getElementById('aPincode').value.trim();
        if (!flat || !street || !city || !pincode) { showPopup("Error", "All fields required"); return; }
        await db.collection("users").doc(currentUser.uid).update({ address: { flat, street, city, pincode } });
        showPopup("Success", "Address saved!"); showProfile();
    };
    
    function showAboutUs() {
        document.getElementById('dynamicPage').innerHTML = `
            <div class="premium-header"><div class="header-top"><div class="logo">PAWAN<span>RETAIL LIMITED</span></div><div class="menu-icon" onclick="toggleMenu()">☰</div></div></div>
            <div class="content-area">
                <div class="premium-card"><h3 style="color:#D4AF37;">🌟 About Us</h3><p><strong>Pawan Retail Limited</strong> is your trusted partner for best deals on food & movies.</p></div>
                <div class="premium-card"><h3 style="color:#D4AF37;">📞 Contact Us</h3><p>📧 thepawanretaillimited@gmail.com</p><p>📞 9142739651</p><button class="btn btn-primary" onclick="copyContact()">Copy Contact</button></div>
            </div>
        `;
    }
    
    function copyContact() {
        navigator.clipboard.writeText("thepawanretaillimited@gmail.com\n9142739651");
        showPopup("Copied!", "Contact info copied");
    }
    
    async function logout() { 
        await auth.signOut(); 
        document.getElementById('loginScreen').classList.remove('hide');
        document.getElementById('appContainer').classList.remove('show');
        showLogin();
    }
    
    // ========== AUTH FUNCTIONS ==========
    function showLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('signupForm').style.display = 'none'; document.getElementById('signupOtpDiv').style.display = 'none'; }
    function showSignup() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupForm').style.display = 'block'; document.getElementById('signupOtpDiv').style.display = 'none'; }
    
    function getOtpFromBoxes() { let otp = ''; for (let i = 0; i < 6; i++) otp += document.getElementById(`otp${i}`).value; return otp; }
    window.moveNext = function(idx, event) {
        let box = document.getElementById(`otp${idx}`);
        if (box.value && !/^\d$/.test(box.value)) box.value = '';
        if (box.value && idx < 5) document.getElementById(`otp${idx+1}`).focus();
    };
    window.movePrev = function(idx, event) {
        if (event.key === 'Backspace' && !document.getElementById(`otp${idx}`).value && idx > 0) {
            document.getElementById(`otp${idx-1}`).focus();
        }
    };
    
    window.sendSignupOTP = async function() {
        let name = document.getElementById('signupName').value.trim(), email = document.getElementById('signupEmail').value.trim(), mobile = document.getElementById('signupMobile').value.trim();
        if (!name || !email || mobile.length !== 10) { showPopup("Error", "All fields required"); return; }
        pendingSignup = { name, email, mobile: '+91' + mobile };
        pendingOtp = generateOTP();
        let sent = await sendOTPEmail(email, pendingOtp);
        if (sent) {
            showPopup("OTP Sent", `OTP sent to ${email}`);
            document.getElementById('signupOtpDiv').style.display = 'block';
            document.getElementById('otp0').focus();
        } else { showPopup("Error", "Failed to send OTP"); }
    };
    
    window.verifySignupOTP = async function() {
        if (getOtpFromBoxes() !== pendingOtp) { showPopup("Error", "Invalid OTP"); return; }
        let pwd = "User@" + Math.floor(Math.random() * 10000);
        try {
            let cred = await auth.createUserWithEmailAndPassword(pendingSignup.email, pwd);
            await db.collection("users").doc(cred.user.uid).set({
                uid: cred.user.uid, email: pendingSignup.email, name: pendingSignup.name,
                mobile: pendingSignup.mobile, prlCoins: 500, address: {}
            });
            showPopup("Success", "Registration Successful! 500 PRL Coins added.");
            showLogin();
        } catch(e) { showPopup("Error", e.message); }
    };
    
    window.handleLogin = async function() {
        let email = document.getElementById('loginEmail').value.trim(), pwd = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            document.getElementById('loginScreen').classList.add('hide');
            document.getElementById('appContainer').classList.add('show');
            await loadUserData(); await seedData(); showHome();
        } catch(e) { showPopup("Error", e.message); }
    };
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await loadUserData(); await seedData();
            document.getElementById('loginScreen').classList.add('hide');
            document.getElementById('appContainer').classList.add('show');
            showHome();
        } else {
            document.getElementById('loginScreen').classList.remove('hide');
            document.getElementById('appContainer').classList.remove('show');
            showLogin();
        }
    });
</script>
</body>
</html>
