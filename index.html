<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRL Digital Banking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --primary: #1A237E;
            --primary-light: #283593;
            --primary-gradient: linear-gradient(135deg, #1A237E, #283593);
            --accent: #FFC107;
            --success: #4CAF50;
            --danger: #F44336;
            --warning: #FF9800;
            --info: #00BCD4;
            --white: #FFFFFF;
            --gray-50: #F8F9FA;
            --gray-100: #F1F3F5;
            --gray-200: #E9ECEF;
            --gray-300: #DEE2E6;
            --gray-400: #CED4DA;
            --gray-500: #ADB5BD;
            --gray-600: #6C757D;
            --gray-700: #495057;
            --gray-800: #343A40;
            --gray-900: #212529;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--gray-100); display: flex; justify-content: center; min-height: 100vh; color: var(--gray-800); overflow-x: hidden; }
        .app { max-width: 420px; width: 100%; background: var(--white); min-height: 100vh; position: relative; overflow-x: hidden; }

        /* ===== PREMIUM ANIMATIONS ===== */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8) rotate(-5deg); } to { opacity: 1; transform: scale(1) rotate(0deg); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(60px) rotate(5deg); } to { opacity: 1; transform: translateX(0) rotate(0deg); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-60px) rotate(-5deg); } to { opacity: 1; transform: translateX(0) rotate(0deg); } }
        @keyframes bounceIn { 0% { transform: scale(0.3) rotate(-10deg); opacity: 0; } 50% { transform: scale(1.1) rotate(2deg); } 70% { transform: scale(0.9) rotate(-1deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes rotateIn { from { opacity: 0; transform: rotate(-360deg) scale(0.5); } to { opacity: 1; transform: rotate(0deg) scale(1); } }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(3deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes shake { 0%, 100% { transform: translateX(0) rotate(0deg); } 20% { transform: translateX(-12px) rotate(-2deg); } 40% { transform: translateX(12px) rotate(2deg); } 60% { transform: translateX(-8px) rotate(-1deg); } 80% { transform: translateX(8px) rotate(1deg); } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(26, 35, 126, 0.15); } 50% { box-shadow: 0 0 50px rgba(26, 35, 126, 0.3); } }
        @keyframes successPop { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 50% { transform: scale(1.3) rotate(5deg); } 70% { transform: scale(0.9) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes confettiFall { 0% { transform: translateY(-100px) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translateY(300px) rotate(720deg) scale(0.5); opacity: 0; } }
        @keyframes confettiBurst { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 100% { transform: scale(1.5) rotate(360deg); opacity: 0; } }
        @keyframes loadingDots { 0%, 80%, 100% { transform: scale(0.6) translateY(0); opacity: 0.4; } 40% { transform: scale(1) translateY(-8px); opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes ripple { 0% { transform: scale(0); opacity: 0.6; } 100% { transform: scale(4); opacity: 0; } }
        @keyframes spin3D { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes floatParticle { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; } 100% { transform: translateY(-200px) translateX(50px) scale(0); opacity: 0; } }
        @keyframes scaleIn { from { transform: scale(0.5) rotateX(30deg); opacity: 0; } to { transform: scale(1) rotateX(0deg); opacity: 1; } }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 40% { transform: translate(3px, -3px); } 60% { transform: translate(-2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

        .animate-fadeUp { animation: fadeInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-fadeDown { animation: fadeInDown 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-fadeScale { animation: fadeInScale 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-slideRight { animation: slideInRight 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-slideLeft { animation: slideInLeft 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-bounce { animation: bounceIn 0.9s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .animate-rotate { animation: rotateIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-glow { animation: glowPulse 2s ease-in-out infinite; }
        .animate-success { animation: successPop 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-shake { animation: shake 0.6s ease-in-out; }
        .animate-scaleIn { animation: scaleIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-glitch { animation: glitch 0.4s ease-in-out; }

        /* STEP INDICATOR */
        .step-indicators { display: flex; justify-content: center; gap: 10px; margin: 16px 0; }
        .step-dot { width: 35px; height: 4px; border-radius: 4px; background: var(--gray-300); transition: var(--transition); position: relative; }
        .step-dot.active { background: var(--primary); width: 45px; }
        .step-dot.completed { background: var(--success); }
        .step-dot.error { background: var(--danger); }
        .step-dot .step-number { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 8px; color: var(--gray-500); font-weight: 600; }

        /* STEP IMAGE WITH 3D EFFECT */
        .step-image { text-align: center; padding: 20px 0; perspective: 800px; }
        .step-image .icon { font-size: 80px; display: block; margin: 0 auto; transform-style: preserve-3d; }
        .step-image .icon.animate-float { animation: float 3s ease-in-out infinite; }
        .step-image .icon.animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .step-image .icon.animate-success { animation: successPop 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .step-image .icon.animate-rotate { animation: rotateIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .step-image .icon.animate-bounce { animation: bounceIn 0.9s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        .step-image .icon.animate-scaleIn { animation: scaleIn 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .step-image .icon.animate-glitch { animation: glitch 0.4s ease-in-out; }

        /* CONFETTI */
        .confetti-container { position: relative; height: 120px; overflow: hidden; }
        .confetti-piece { position: absolute; width: 12px; height: 12px; top: 50%; border-radius: 2px; animation: confettiFall 2.5s ease-in forwards; }
        .confetti-piece:nth-child(1) { left: 8%; background: #FF6B6B; animation-delay: 0s; transform: rotate(45deg); }
        .confetti-piece:nth-child(2) { left: 20%; background: #4ECDC4; animation-delay: 0.2s; transform: rotate(90deg); }
        .confetti-piece:nth-child(3) { left: 32%; background: #FFE66D; animation-delay: 0.4s; transform: rotate(135deg); }
        .confetti-piece:nth-child(4) { left: 44%; background: #A8E6CF; animation-delay: 0.6s; transform: rotate(180deg); }
        .confetti-piece:nth-child(5) { left: 56%; background: #FF8A5C; animation-delay: 0.8s; transform: rotate(225deg); }
        .confetti-piece:nth-child(6) { left: 68%; background: #6C5CE7; animation-delay: 1.0s; transform: rotate(270deg); }
        .confetti-piece:nth-child(7) { left: 80%; background: #F7DC6F; animation-delay: 1.2s; transform: rotate(315deg); }
        .confetti-piece:nth-child(8) { left: 92%; background: #BB8FCE; animation-delay: 1.4s; transform: rotate(360deg); }

        /* PARTICLES */
        .particles { position: relative; height: 80px; overflow: hidden; }
        .particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; animation: floatParticle 2s ease-in forwards; }
        .particle:nth-child(1) { left: 10%; background: var(--primary); animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; background: var(--accent); animation-delay: 0.3s; }
        .particle:nth-child(3) { left: 40%; background: var(--success); animation-delay: 0.6s; }
        .particle:nth-child(4) { left: 55%; background: var(--info); animation-delay: 0.9s; }
        .particle:nth-child(5) { left: 70%; background: var(--warning); animation-delay: 1.2s; }
        .particle:nth-child(6) { left: 85%; background: var(--danger); animation-delay: 1.5s; }

        /* HEADER */
        .header {
            background: var(--primary-gradient);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.2);
        }
        .logo { display: flex; align-items: center; gap: 10px; color: var(--white); font-size: 18px; font-weight: 800; }
        .logo i { font-size: 24px; color: var(--accent); }
        .logo span { font-size: 9px; opacity: 0.7; font-weight: 400; display: block; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .header-btn { color: rgba(255,255,255,0.8); font-size: 18px; cursor: pointer; padding: 6px; border-radius: 50%; transition: var(--transition); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: none; position: relative; }
        .header-btn:hover { background: rgba(255,255,255,0.15); color: var(--white); }
        .role-badge { font-size: 9px; background: rgba(255, 193, 7, 0.15); color: var(--accent); padding: 3px 12px; border-radius: 20px; font-weight: 600; border: 1px solid rgba(255, 193, 7, 0.2); }

        /* CONTENT */
        .content { padding: 14px; padding-bottom: 80px; min-height: calc(100vh - 60px); }
        .page { animation: fadeInUp 0.6s ease forwards; }

        /* CARDS WITH GLASS EFFECT */
        .card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); transition: var(--transition); border: 1px solid rgba(255,255,255,0.2); }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .card-title { font-size: 15px; font-weight: 700; color: var(--gray-800); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* BUTTONS WITH RIPPLE EFFECT */
        .btn { padding: 12px 24px; border: none; border-radius: 25px; font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); font-family: 'Inter', sans-serif; position: relative; overflow: hidden; }
        .btn:active { transform: scale(0.95); }
        .btn .ripple-effect { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3); animation: ripple 0.6s linear; }
        .btn-primary { background: var(--primary-gradient); color: var(--white); box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(26, 35, 126, 0.4); }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
        .btn-secondary:hover { background: var(--gray-300); transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, #4CAF50, #388E3C); color: var(--white); box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(76, 175, 80, 0.4); }
        .btn-danger { background: linear-gradient(135deg, #F44336, #C62828); color: var(--white); }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(244, 67, 54, 0.4); }
        .btn-gold { background: linear-gradient(135deg, #FFC107, #FFB300); color: var(--gray-900); box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3); }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255, 193, 7, 0.4); }
        .btn-info { background: linear-gradient(135deg, #00BCD4, #0097A7); color: var(--white); }
        .btn-sm { padding: 6px 14px; font-size: 11px; border-radius: 15px; }
        .btn-block { width: 100%; }
        .btn-lg { padding: 14px 28px; font-size: 16px; }

        /* INPUTS */
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
        .input { width: 100%; padding: 12px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 14px; transition: var(--transition); background: var(--white); color: var(--gray-800); font-family: 'Inter', sans-serif; }
        .input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.05); }
        .input::placeholder { color: var(--gray-400); }
        .input-sm { padding: 8px 14px; font-size: 12px; border-radius: 10px; }
        .input-lg { padding: 14px 18px; font-size: 16px; }

        /* LOGIN */
        .login-box { max-width: 380px; margin: 20px auto; padding: 30px 24px; background: var(--white); border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow-xl); animation: fadeInUp 0.6s ease; }
        .login-box .icon { font-size: 56px; margin-bottom: 8px; color: var(--primary); }
        .login-box h2 { font-size: 26px; font-weight: 800; color: var(--primary); margin: 4px 0; }
        .login-box .subtitle { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; }
        .login-box .toggle-link { color: var(--primary); cursor: pointer; font-weight: 600; transition: var(--transition); }
        .login-box .toggle-link:hover { text-decoration: underline; }
        .login-box .demo-hint { margin-top: 10px; font-size: 10px; color: var(--gray-500); background: rgba(26, 35, 126, 0.04); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(26, 35, 126, 0.08); }

        /* OTP */
        .otp-inputs { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
        .otp-inputs input { width: 46px; height: 54px; text-align: center; font-size: 22px; font-weight: 700; border: 2px solid var(--gray-200); border-radius: 12px; background: var(--white); color: var(--gray-800); transition: var(--transition); }
        .otp-inputs input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.05); }
        .otp-timer { font-size: 13px; color: var(--gray-500); text-align: center; margin: 6px 0; }
        .otp-timer .time { color: var(--primary); font-weight: 700; }
        .otp-resend { font-size: 12px; color: var(--primary); cursor: pointer; font-weight: 600; transition: var(--transition); }
        .otp-resend:hover { text-decoration: underline; }
        .otp-resend.disabled { color: var(--gray-400); cursor: not-allowed; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 420px; width: 100%; background: var(--white); border-radius: 20px 20px 0 0; padding: 6px 8px 12px; display: none; justify-content: space-around; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); z-index: 50; border-top: 1px solid var(--gray-200); animation: fadeInUp 0.6s ease; }
        .bottom-nav.show { display: flex; }
        .nav-item { text-align: center; cursor: pointer; padding: 6px 10px; border-radius: 12px; transition: var(--transition); position: relative; min-width: 52px; background: transparent; border: none; }
        .nav-item i { font-size: 20px; color: var(--gray-400); transition: var(--transition); }
        .nav-item span { display: block; font-size: 9px; color: var(--gray-400); font-weight: 600; margin-top: 2px; transition: var(--transition); }
        .nav-item.active i { color: var(--primary); }
        .nav-item.active span { color: var(--primary); }
        .nav-item.active { background: rgba(26, 35, 126, 0.04); }

        /* MENU */
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 999; display: none; backdrop-filter: blur(4px); }
        .menu-overlay.show { display: block; }
        .menu-sidebar { position: fixed; top: 0; left: -300px; width: 290px; height: 100%; background: var(--white); z-index: 1000; transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; border-radius: 0 24px 24px 0; box-shadow: var(--shadow-xl); overflow-y: auto; }
        .menu-sidebar.open { left: 0; }
        .menu-close-btn { position: absolute; top: 14px; right: 14px; background: var(--gray-100); border: none; font-size: 16px; cursor: pointer; color: var(--gray-500); padding: 6px; border-radius: 50%; width: 36px; height: 36px; transition: var(--transition); }
        .menu-close-btn:hover { background: var(--gray-200); transform: rotate(90deg); }
        .menu-header { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--gray-200); }
        .menu-header .avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--primary-gradient); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--white); font-weight: 700; }
        .menu-header .name { font-weight: 700; font-size: 16px; color: var(--gray-800); }
        .menu-header .email { font-size: 11px; color: var(--gray-500); }
        .menu-item { padding: 12px 14px; margin-bottom: 2px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--gray-700); font-size: 13px; transition: var(--transition); border-radius: 12px; background: transparent; border: none; width: 100%; }
        .menu-item:hover { background: var(--gray-100); }
        .menu-item .icon { font-size: 16px; width: 28px; text-align: center; color: var(--primary); }
        .menu-item.logout-item { color: var(--danger); margin-top: 8px; border-top: 1px solid var(--gray-200); padding-top: 14px; }
        .menu-item.logout-item .icon { color: var(--danger); }

        /* TOAST */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background: var(--white); border-radius: 12px; padding: 14px 20px; box-shadow: var(--shadow-xl); border-left: 4px solid var(--primary); max-width: 90%; animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast .msg { font-weight: 600; font-size: 13px; color: var(--gray-800); }
        .toast .sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--info); }

        /* LOADER */
        .loader-box { text-align: center; padding: 30px 0; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top: 3px solid var(--primary); border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* DASHBOARD */
        .dashboard-welcome { background: var(--primary-gradient); border-radius: var(--radius); padding: 20px; color: var(--white); margin-bottom: 16px; animation: fadeInUp 0.6s ease; }
        .dashboard-welcome .greeting { font-size: 14px; opacity: 0.8; }
        .dashboard-welcome .name { font-size: 22px; font-weight: 800; margin: 2px 0; }
        .dashboard-welcome .time { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .dashboard-welcome .status-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-top: 6px; animation: pulse 2s ease-in-out infinite; }
        .dashboard-welcome .status-badge.open { background: rgba(76, 175, 80, 0.2); color: #81C784; }
        .dashboard-welcome .status-badge.closed { background: rgba(244, 67, 54, 0.2); color: #EF9A9A; }

        /* STATS CARDS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
        .stat-card { background: var(--white); border-radius: var(--radius-sm); padding: 14px; text-align: center; border: 1px solid var(--gray-200); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .stat-card .number { font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-card .label { font-size: 10px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .stat-card .icon { font-size: 24px; margin-bottom: 2px; display: block; }
        .stat-card.deposit .number { color: var(--success); }
        .stat-card.withdraw .number { color: var(--danger); }

        /* QUICK ACTIONS */

function getBusinessHours() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const timeInMinutes = hours * 60 + minutes;
    const startBusiness = 10 * 60;
    const endBusiness = 16 * 60;
    const isOpen = timeInMinutes >= startBusiness && timeInMinutes < endBusiness;
    const charge = isOpen ? '1%' : '₹47.27';
    const chargeValue = isOpen ? 0.01 : 47.27;
    return { isOpen, charge, chargeValue, hours, minutes, timeStr: `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}` };
}

function calculateCharge(amount) {
    const { isOpen, chargeValue, charge } = getBusinessHours();
    let chargeAmount = isOpen ? Math.round(amount * 0.01) : 47.27;
    return { charge: chargeAmount, total: amount + chargeAmount, rate: charge, isOpen: isOpen };
}

async function handleRegister() {

    const pwd = document.getElementById('regPassword').value;

    document.getElementById('customAmount').value = '';

}

function onCustomAmount() {
    const val = parseInt(document.getElementById('customAmount').value);
    if (val > 0) {
        selectedAmount = val;
        document.querySelectorAll('.amount-btn').forEach(el => el.classList.remove('active'));
        updateChargePreview();

function updateChargePreview() {
    const preview = document.getElementById('chargePreview');

    if (selectedAmount > 0) {

        document.getElementById('previewAmount').textContent = `₹${selectedAmount}`;
        document.getElementById('previewCharge').textContent = `₹${charge.toFixed(2)}`;

async function confirmCashTransaction() {
    const { charge, total, isOpen } = calculateCharge(selectedAmount);
    const details = getTransferDetails();
    
    try {
        const transaction = {
            type: 'cash_to_online',
            userId: currentUser.uid,
            userEmail: userData?.email || '',
            userName: userData?.name || '',
            userPhone: userData?.phone || '',
            amount: selectedAmount,
            charge: charge,
            total: total,
            isOpen: isOpen,
            rate: isOpen ? '1%' : '₹47.27',
            proprietor: selectedProprietor,
            method: selectedTransferMethod,
            transferDetails: details,
            status: 'pending',
            step: 1,
            stepName: 'Agent Collect Money',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        const docRef = await db.collection('transactions').add(transaction);
        currentTransactionId = docRef.id;
        
        await db.collection('users').doc(currentUser.uid).update({
            totalDeposit: firebase.firestore.FieldValue.increment(selectedAmount)
        });
        
        showToast('✅ Transaction completed successfully! 🎉', 'success');
        navigateTo('dashboard');
        showToast('📋 Transaction ID: #' + docRef.id.substring(0,8), 'info');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function confirmOnlineTransaction() {
    const name = document.getElementById('onlineCustomerName')?.value.trim() || userData?.name || '';
    const phone = document.getElementById('onlineCustomerPhone')?.value.trim() || userData?.phone || '';
    const utr = window._onlineUtr || '';
    
    if (!name || !phone) { showToast('Enter customer details', 'error'); return; }
    if (!utr) { showToast('Enter UTR number', 'error'); return; }
    
    try {
        const transaction = {
            type: 'online_to_cash',
            userId: currentUser.uid,
            userEmail: userData?.email || '',
            userName: userData?.name || '',
            userPhone: userData?.phone || '',
            amount: selectedAmount,
            charge: 0,
            total: selectedAmount,
            rate: 'Free',
            isOpen: true,
            proprietor: selectedProprietor,
            customerName: name,
            customerPhone: phone,
            utr: utr,
            status: 'pending',
            step: 1,
            stepName: 'Pay Online & Enter UTR',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        const docRef = await db.collection('transactions').add(transaction);
        currentTransactionId = docRef.id;
        
        await db.collection('users').doc(currentUser.uid).update({
            totalWithdraw: firebase.firestore.FieldValue.increment(selectedAmount)
        });
        
        showToast('✅ Withdrawal completed successfully! 🎉', 'success');
        navigateTo('dashboard');
        showToast('📋 Transaction ID: #' + docRef.id.substring(0,8), 'info');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function updateTransactionStatus(transactionId, step) {
    let status = 'pending';
    let stepName = '';
    
    const doc = await db.collection('transactions').doc(transactionId).get();
    const t = doc.data();
    const isCashToOnline = t.type === 'cash_to_online';
    
    if (step === 1) {
        status = 'pending';
        stepName = isCashToOnline ? 'Agent Collect Money' : 'Pay Online & Enter UTR';
    } else if (step === 2) {
        status = 'processing';
        stepName = isCashToOnline ? 'Process Your Money' : 'Verify Payment & Details';
    } else if (step === 3) {
        status = 'processing';
        stepName = isCashToOnline ? 'Verification & Sending' : 'Withdrawal Your Money';
    } else if (step === 4) {
        status = 'completed';
        stepName = isCashToOnline ? 'Transaction Complete' : 'Withdrawal Complete';
    } else if (step === 0) {
        status = 'rejected';
        stepName = 'Rejected';
    }
    
    try {
        await db.collection('transactions').doc(transactionId).update({
            status: status,
            step: step,
            stepName: stepName,
            updatedAt: new Date().toISOString()
        });
        showToast(`✅ Status updated to: ${stepName}`, 'success');
        navigateTo('transactionDetail', transactionId);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function adminApproveWithImage2(transactionId) {
    const utr = document.getElementById('adminUtr2').value.trim();
    const imageUrl = document.getElementById('adminImageUrl2').value.trim();
    
    if (!utr) { showToast('Enter UTR number', 'error'); return; }

        navigateTo('transactionDetail', transactionId);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

                </button>
            </div>
            <div class="password-wrapper">
                <input class="input input-sm" id="confirmPassword" type="password" placeholder="Confirm New Password">

async function changePassword() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd || !confirmPwd) { showToast('Fill all fields', 'error'); return; }
    if (newPwd.length < 6) { showToast('Password min 6 chars', 'error'); return; }
    if (newPwd !== confirmPwd) { showToast('Passwords do not match', 'error'); return; }
    try {
        const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPwd);
        await currentUser.reauthenticateWithCredential(cred);
        await currentUser.updatePassword(newPwd);
        await db.collection('users').doc(currentUser.uid).update({ password: newPwd });
        showToast('✅ Password changed!', 'success');
        navigateTo('profile');
    } catch(e) {
        if (e.code === 'auth/wrong-password') { showToast('Current password is incorrect', 'error'); } 
        else { showToast('Error: ' + e.message, 'error'); }
    }
}

async function loadAdminStats() {
    if (!isAdmin) return;
    try {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const snap = await db.collection('transactions').get();
        let totalIncome = 0, totalCharges = 0, pending = 0;
        snap.forEach(doc => {
            const data = doc.data();
            const createdAt = new Date(data.createdAt);
            if (createdAt >= today) {
                totalIncome += data.total || data.amount || 0;
                totalCharges += data.charge || 0;
            }
            if (data.status === 'pending' || data.status === 'processing') {
                pending++;
            }
        });
        const usersSnap = await db.collection('users').where('role', '==', 'customer').get();
        document.getElementById('statTodayIncome').textContent = `₹${totalIncome}`;
        document.getElementById('statTodayCharges').textContent = `₹${totalCharges}`;
        document.getElementById('statTotalCustomers').textContent = usersSnap.size;
        document.getElementById('statPending').textContent = pending;
        
        const container = document.getElementById('adminTransactionsList');
        if (container) {
            let txns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            txns.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            txns = txns.slice(0, 10);
            let html = '';
            txns.forEach(t => {
                const statusColors = {
                    pending: 'status-pending',
                    processing: 'status-processing',
                    completed: 'status-completed',
                    rejected: 'status-rejected'
                };
                const stepName = t.stepName || (t.type === 'cash_to_online' ? 'Agent Collect Money' : 'Pay Online & Enter UTR');
                html += `
                    <div class="transaction-item" onclick="navigateTo('adminDetail', '${t.id}')">
                        <div class="flex-between">
                            <span class="id">#${t.id.substring(0,8)}</span>
                            <span class="status ${statusColors[t.status] || 'status-pending'}">${t.status}</span>

                        <div class="flex-between">

                            <span class="amount">₹${t.total || t.amount}</span>
                        </div>
                        <div class="detail">${stepName} • ${t.createdAt ? new Date(t.createdAt).toLocaleString() : 'N/A'}</div>
                    </div>
                `;
            });
            container.innerHTML = html || '<div class="empty-state"><div class="icon">📭</div><div class="title">No transactions</div></div>';
        }
    } catch(e) { console.log('Admin stats error:', e); }
}

// ============================================================
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userData = doc.data();
                isAdmin = userData.role === 'admin';
                if (userData.blocked) {
                    showToast('🚫 Account blocked!', 'error');
                    await auth.signOut();
                    navigateTo('login');
                    return;
                }
                updateMenu();
                showBottomNav(true);
                navigateTo('dashboard');
            } else {
                showToast('Profile not found', 'error');
                await auth.signOut();
                navigateTo('login');
            }
        } catch(e) { navigateTo('login'); }
    } else {
        currentUser = null; userData = null; isAdmin = false;
        showBottomNav(false);
        if (document.getElementById('pageContent').innerHTML === '') {
            navigateTo('splash');
