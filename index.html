<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRL • Customer Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- html2pdf for invoice download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#f1f3f6;display:flex;justify-content:center;min-height:100vh}
        .app{max-width:450px;width:100%;background:#f1f3f6;min-height:100vh;position:relative}
        
        .header{background:linear-gradient(135deg,#0f0a1a,#1a0f2a);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#D4AF37,#F5E56B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .logo span{font-size:9px;color:#D4AF37;opacity:0.5}
        .header-actions{display:flex;gap:10px;align-items:center}
        .header-btn{color:rgba(255,255,255,0.8);font-size:18px;cursor:pointer;padding:4px;position:relative}
        .header-btn:hover{color:#D4AF37}
        .header-btn .badge{position:absolute;top:-4px;right:-6px;background:#ef4444;color:#fff;font-size:8px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        
        .content{padding:12px 14px;padding-bottom:80px}
        
        .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .card-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        
        .btn{padding:10px 18px;border:none;border-radius:25px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.3s}
        .btn:active{transform:scale(0.95)}
        .btn-gold{background:linear-gradient(135deg,#D4AF37,#B8860B);color:#1a0f2a;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.4)}
        .btn-secondary{background:#e8ecf0;color:#1a1a2e}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-success{background:#22c55e;color:#fff}
        .btn-warning{background:#f59e0b;color:#fff}
        .btn-sm{padding:4px 12px;font-size:10px;border-radius:15px}
        .btn-block{width:100%}
        
        .input{width:100%;padding:10px 16px;border:2px solid #e0e0e0;border-radius:25px;font-size:13px;margin:4px 0;background:#fafbfc;transition:0.3s}
        .input:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,0.1)}
        .input-sm{padding:6px 12px;font-size:11px;border-radius:15px}
        
        .flex{display:flex;gap:8px;flex-wrap:wrap}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .text-center{text-align:center}
        .text-muted{color:#999;font-size:12px}
        .mt-2{margin-top:10px}
        .mb-2{margin-bottom:10px}
        
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border-radius:12px;padding:12px 20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);border-left:4px solid #D4AF37;max-width:90%;animation:slideDown 0.3s ease}
        .toast .msg{font-weight:600;font-size:13px}
        .toast.success{border-left-color:#22c55e}
        .toast.error{border-left-color:#ef4444}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:450px;width:100%;background:#fff;border-radius:16px 16px 0 0;padding:6px 8px 10px;display:flex;justify-content:space-around;box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:50}
        .nav-item{text-align:center;cursor:pointer;padding:4px 8px;border-radius:10px;transition:0.3s}
        .nav-item i{font-size:20px;color:#999}
        .nav-item span{display:block;font-size:9px;color:#999;font-weight:600}
        .nav-item.active i{color:#D4AF37}
        .nav-item.active span{color:#D4AF37}
        .nav-item .nav-badge{position:absolute;top:-4px;right:-8px;background:#ef4444;color:#fff;font-size:8px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        
        .login-box{max-width:340px;margin:30px auto;padding:30px 20px;background:#fff;border-radius:16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.06)}
        .login-box .icon{font-size:56px;margin-bottom:10px}
        .login-box h2{color:#1a1a2e;margin:8px 0}
        .login-box .hint{font-size:10px;color:#999;margin-top:10px;padding:8px;background:#f8f9fa;border-radius:8px}
        
        .banner{background:linear-gradient(135deg,#1a0f2a,#2d1b4e);margin:0 0 10px;border-radius:12px;padding:16px;color:#fff;position:relative;overflow:hidden;cursor:pointer;min-height:110px;transition:0.3s}
        .banner:active{transform:scale(0.97)}
        .banner .offer{font-size:22px;font-weight:800;background:linear-gradient(135deg,#D4AF37,#F5E56B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .banner .sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:4px}
        .banner .price-tag{font-size:13px;color:#D4AF37;font-weight:700;margin-top:2px}
        .banner .price-tag .mrp{color:#999;text-decoration:line-through;font-weight:300;margin-left:6px;font-size:11px}
        .banner .btn-sm{padding:4px 14px;background:#D4AF37;border:none;border-radius:20px;font-weight:700;font-size:10px;color:#1a0f2a;cursor:pointer;margin-top:4px}
        .banner .banner-img{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:80px;height:80px;border-radius:10px;border:2px solid rgba(212,175,55,0.3);background:#1a0f2a;overflow:hidden;display:flex;align-items:center;justify-content:center}
        .banner .banner-img img{width:100%;height:100%;object-fit:cover;border-radius:10px}
        .banner .banner-img .fallback{font-size:36px;color:rgba(255,255,255,0.3)}
        .banner .banner-label{position:absolute;top:8px;right:95px;background:#ef4444;color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px}
        
        .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 0 80px}
        .product-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:0.3s}
        .product-card:active{transform:scale(0.97)}
        .product-card .img{width:100%;height:150px;background:#f0edff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
        .product-card .img img{width:100%;height:100%;object-fit:cover}
        .product-card .img .fallback{font-size:42px;color:#999}
        .product-card .img .discount-badge{position:absolute;top:6px;right:6px;background:#ef4444;color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px}
        .product-card .info{padding:8px 10px}
        .product-card .name{font-weight:600;font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:28px}
        .product-card .price-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
        .product-card .price{color:#D4AF37;font-weight:800;font-size:15px}
        .product-card .mrp{color:#999;font-size:10px;text-decoration:line-through}
        .product-card .rating{color:#f59e0b;font-size:10px}
        .product-card .add-btn{width:100%;padding:4px;background:#D4AF37;color:#1a0f2a;border:none;border-radius:6px;font-weight:700;font-size:10px;cursor:pointer;margin-top:4px;transition:0.3s}
        .product-card .add-btn:active{transform:scale(0.95)}
        
        .categories-scroll{display:flex;gap:6px;overflow-x:auto;padding:8px 0;scrollbar-width:none;margin-bottom:6px}
        .categories-scroll::-webkit-scrollbar{display:none}
        .cat-item{display:flex;flex-direction:column;align-items:center;min-width:52px;cursor:pointer;transition:0.3s;padding:4px;border-radius:8px}
        .cat-item:active{transform:scale(0.9)}
        .cat-item .icon{width:38px;height:38px;background:#f0edff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:0.3s}
        .cat-item .label{font-size:8px;color:#666;margin-top:4px;text-align:center;font-weight:500}
        .cat-item.active .icon{background:#D4AF37;color:#fff}
        .cat-item.active .label{color:#D4AF37}
        
        .search-bar{background:#fff;margin:0 0 8px;border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .search-bar input{flex:1;border:none;outline:none;font-size:13px;background:transparent}
        .search-bar input::placeholder{color:#999}
        .search-bar .icon{color:#D4AF37;font-size:14px}
        
        .cart-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
        .cart-item .c-img{width:50px;height:50px;border-radius:8px;overflow:hidden;background:#f0edff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .cart-item .c-img img{width:100%;height:100%;object-fit:cover}
        .cart-item .c-img .fallback{font-size:20px;color:#999}
        .cart-item .info{flex:1}
        .cart-item .info .name{font-weight:600;font-size:12px}
        .cart-item .info .price{color:#D4AF37;font-weight:700;font-size:13px}
        .cart-item .qty-controls{display:flex;align-items:center;gap:6px}
        .cart-item .qty-controls button{width:28px;height:28px;border-radius:50%;border:none;background:#fdf6e3;color:#D4AF37;font-weight:700;cursor:pointer}
        .cart-item .qty-controls span{min-width:20px;text-align:center;font-weight:700}
        
        .order-item{background:#f8f9fa;padding:10px;border-radius:10px;margin-bottom:6px;border-left:3px solid #D4AF37;cursor:pointer}
        .order-item:active{transform:scale(0.97)}
        .order-item .id{font-weight:600;font-size:11px}
        .order-item .detail{font-size:10px;color:#666}
        .order-item .status{font-size:9px;padding:2px 10px;border-radius:10px;font-weight:600;display:inline-block}
        .status-pending{background:#fef3c7;color:#d97706}
        .status-confirmed{background:#dbeafe;color:#2563eb}
        .status-shipped{background:#ede9fe;color:#7c3aed}
        .status-delivered{background:#d1fae5;color:#059669}
        .status-cancelled{background:#fee2e2;color:#dc2626}
        
        .order-detail-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0}
        .order-detail-item .od-img{width:50px;height:50px;border-radius:8px;overflow:hidden;background:#f0edff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .order-detail-item .od-img img{width:100%;height:100%;object-fit:cover}
        .order-detail-item .od-img .fallback{font-size:20px;color:#999}
        .order-detail-item .od-info{flex:1}
        .order-detail-item .od-info .name{font-weight:600;font-size:12px}
        .order-detail-item .od-info .qty{font-size:10px;color:#666}
        .order-detail-item .od-price{font-weight:700;color:#D4AF37;font-size:14px}
        
        .tracking-steps{display:flex;flex-direction:column;gap:8px;padding:10px 0}
        .tracking-step{display:flex;align-items:center;gap:12px;padding:4px 0}
        .tracking-step .dot{width:12px;height:12px;border-radius:50%;background:#e0e0e0;flex-shrink:0;transition:0.3s}
        .tracking-step .dot.active{background:#D4AF37}
        .tracking-step .dot.completed{background:#22c55e}
        .tracking-step .info{flex:1}
        .tracking-step .info .title{font-weight:600;font-size:12px}
        .tracking-step .info .time{font-size:9px;color:#999}
        
        .payment-methods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .payment-method{padding:12px;border:2px solid #e0e0e0;border-radius:12px;text-align:center;cursor:pointer;transition:0.3s}
        .payment-method.active{border-color:#D4AF37;background:#fffdf5}
        .payment-method i{font-size:24px;color:#D4AF37}
        .payment-method .label{font-size:10px;font-weight:600;margin-top:4px}
        
        .upi-box{background:#f0f7ff;border:2px dashed #D4AF37;border-radius:12px;padding:16px;text-align:center;margin:10px 0}
        .upi-box .upi-id{font-size:20px;font-weight:800;color:#1a0f2a;letter-spacing:1px}
        .upi-box .upi-label{font-size:11px;color:#666;margin-top:4px}
        .qr-container{display:flex;justify-content:center;margin:10px 0}
        #qrcode{padding:12px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
        
        .detail-img{width:100%;height:250px;background:#f0edff;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .detail-img img{width:100%;height:100%;object-fit:contain;background:#fff}
        .detail-img .fallback{font-size:70px;color:#999}
        .detail-thumbs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none;margin-bottom:8px}
        .detail-thumbs::-webkit-scrollbar{display:none}
        .detail-thumbs .thumb{width:60px;height:60px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:0.3s;object-fit:cover;flex-shrink:0;background:#f0edff}
        .detail-thumbs .thumb.active{border-color:#D4AF37}
        .detail-name{font-size:20px;font-weight:800;margin:8px 0 4px}
        .detail-price{font-size:24px;font-weight:800;color:#D4AF37}
        .detail-mrp{font-size:14px;color:#999;text-decoration:line-through;margin-left:8px}
        .detail-discount{font-size:13px;color:#22c55e;font-weight:700;margin-left:8px}
        .detail-rating{color:#f59e0b;font-size:13px}
        .detail-desc{color:#666;font-size:13px;line-height:1.6;margin:6px 0}
        .qty-selector{display:flex;align-items:center;gap:12px;margin:8px 0}
        .qty-selector button{width:34px;height:34px;border-radius:50%;border:2px solid #e0e0e0;background:#fff;font-size:16px;cursor:pointer;transition:0.3s}
        .qty-selector button:hover{border-color:#D4AF37}
        .qty-selector span{font-size:18px;font-weight:700;min-width:30px;text-align:center}
        
        .menu-sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:linear-gradient(180deg,#0f0a1a,#1a0f2a);z-index:1000;transition:left 0.3s;padding:20px;border-radius:0 20px 20px 0;box-shadow:4px 0 30px rgba(0,0,0,0.5);overflow-y:auto}
        .menu-sidebar.open{left:0}
        .menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:none;backdrop-filter:blur(4px)}
        .menu-overlay.show{display:block}
        .menu-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1px solid rgba(212,175,55,0.1);color:#e0d5c0;font-size:14px;transition:0.3s}
        .menu-item:hover{background:rgba(212,175,55,0.15);border-color:#D4AF37;transform:translateX(5px)}
        .menu-item .icon{font-size:18px}
        .menu-item.logout-item{background:rgba(239,68,68,0.12);color:#f87171;border-color:rgba(239,68,68,0.2)}
        .menu-item.logout-item:hover{background:rgba(239,68,68,0.25)}
        .menu-header{text-align:center;margin-bottom:16px;padding-bottom:16px;border-bottom:2px solid rgba(212,175,55,0.2)}
        .menu-header .avatar{width:55px;height:55px;border-radius:50%;border:3px solid #D4AF37;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px;background:rgba(255,255,255,0.05);color:#fff}
        .menu-header .name{font-weight:700;font-size:15px;color:#e0d5c0}
        .menu-header .email{font-size:11px;color:#999}
        .menu-close-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px;border-radius:50%;transition:0.3s}
        .menu-close-btn:hover{background:rgba(255,255,255,0.1);transform:rotate(90deg)}
        
        .otp-inputs{display:flex;gap:8px;justify-content:center;margin:12px 0}
        .otp-box{width:44px;height:50px;text-align:center;font-size:20px;font-weight:700;border:2px solid #e0e0e0;border-radius:12px;background:#fff;transition:0.3s}
        .otp-box:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,0.1)}
        
        .loader-box{text-align:center;padding:30px 0}
        .loader-box .spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #D4AF37;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite}
        @keyframes spin{100%{transform:rotate(360deg)}}
        
        .review-item{background:#f8f9fa;border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid #D4AF37}
        .review-item .user{font-weight:600;font-size:12px}
        .review-item .rating{color:#f59e0b;font-size:11px}
        .review-item .comment{font-size:11px;color:#666;margin-top:4px}
        .review-item .date{font-size:9px;color:#999;margin-top:2px}
        
        .review-form{background:#f8f9fa;border-radius:12px;padding:12px;margin-top:8px}
        .review-form textarea{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:12px;font-size:12px;resize:vertical;min-height:60px;font-family:inherit}
        .review-form textarea:focus{outline:none;border-color:#D4AF37}
        .review-form .stars{display:flex;gap:4px;margin:4px 0}
        .review-form .stars button{background:none;border:none;font-size:24px;cursor:pointer;color:#ddd;transition:0.3s}
        .review-form .stars button.active{color:#f59e0b}
        
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .detail-item{background:#f8f9fa;padding:10px;border-radius:8px}
        .detail-item .label{font-size:9px;color:#999;text-transform:uppercase}
        .detail-item .value{font-size:13px;font-weight:600;color:#1a1a2e}
        
        .checkout-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0}
        .checkout-item .ci-img{width:40px;height:40px;border-radius:6px;overflow:hidden;background:#f0edff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .checkout-item .ci-img img{width:100%;height:100%;object-fit:cover}
        .checkout-item .ci-img .fallback{font-size:16px;color:#999}
        .checkout-item .ci-info{flex:1}
        .checkout-item .ci-info .name{font-weight:600;font-size:11px}
        .checkout-item .ci-info .qty{font-size:10px;color:#666}
        .checkout-item .ci-price{font-weight:600;color:#D4AF37;font-size:13px}
        
        /* Help/Request Options */
        .help-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:0.3s;margin-bottom:6px}
        .help-btn:hover{background:#f8f9fa;border-color:#D4AF37}
        .help-btn:active{transform:scale(0.97)}
        .help-btn .icon{font-size:16px;width:24px;text-align:center}
        .help-btn .text{flex:1;font-size:12px;font-weight:500}
        .help-btn .arrow{color:#999;font-size:12px}
        .help-btn .status-tag{font-size:8px;padding:2px 8px;border-radius:10px;font-weight:600}
        .help-btn .status-tag.approve{background:#d1fae5;color:#059669}
        .help-btn .status-tag.fail{background:#fee2e2;color:#dc2626}
        .help-btn.disabled{opacity:0.5;cursor:not-allowed}
        .help-btn.disabled:hover{background:transparent;border-color:#e0e0e0}
        
        .help-status{padding:4px 10px;border-radius:10px;font-size:9px;font-weight:600;display:inline-block}
        .help-status.pending{background:#fef3c7;color:#d97706}
        .help-status.approved{background:#d1fae5;color:#059669}
        .help-status.rejected{background:#fee2e2;color:#dc2626}
        
        /* Invoice Styles */
        .invoice-box{background:#fff;padding:20px;border-radius:12px;margin:10px 0;border:1px solid #e0e0e0;max-width:100%}
        .invoice-box .inv-header{text-align:center;border-bottom:2px solid #D4AF37;padding-bottom:12px;margin-bottom:12px}
        .invoice-box .inv-header .company{font-size:22px;font-weight:800;color:#1a0f2a;letter-spacing:1px}
        .invoice-box .inv-header .company span{color:#D4AF37}
        .invoice-box .inv-header .sub{font-size:11px;color:#999}

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyDzgIrjcWwnqS5e3lDplptyU6VDSngn7_o",
    authDomain: "pawan-8388d.firebaseapp.com",
    projectId: "pawan-8388d",
    storageBucket: "pawan-8388d.firebasestorage.app",
    messagingSenderId: "522473603051",
    appId: "1:522473603051:web:519543c829c1eefd1523ae"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let userData = null;
let cart = [];
let allProducts = [];
let currentPage = 'home';
let productQty = 1;
let tempEmail = '', tempPassword = '', tempName = '', tempPhone = '';
let generatedOTP = '';
let otpExpiry = null;
let ordersCache = [];

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'success', sub = '') {
    let t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<div class="msg">${msg}</div>${sub ? `<div style="font-size:11px;color:#666;margin-top:2px;">${sub}</div>` : ''}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ============================================================
// RENDER
// ============================================================
function render(html) {
    document.getElementById('pageContent').innerHTML = html;
}

function showLoader() {
    document.getElementById('pageContent').innerHTML = `<div class="loader-box"><div class="spinner"></div><p class="text-muted" style="margin-top:10px;">Loading...</p></div>`;
}

function navigateTo(page, data = null) {
    if (!currentUser && page !== 'login' && page !== 'register' && page !== 'otp') {
        showLogin();
        return;
    }
    currentPage = page;
    
    document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('active');
        el.querySelector('i').style.color = '#999';
        el.querySelector('span').style.color = '#999';
    });
    const items = document.querySelectorAll('.nav-item');
    const map = { home:0, cart:1, orders:2, profile:3 };
    if (items[map[page]] !== undefined) {
        items[map[page]].classList.add('active');
        items[map[page]].querySelector('i').style.color = '#D4AF37';
        items[map[page]].querySelector('span').style.color = '#D4AF37';
    }
    
    showLoader();
    setTimeout(() => {
        let html = '';
        try {
            switch(page) {
                case 'login': html = renderLogin(); break;
                case 'register': html = renderRegister(); break;
                case 'otp': html = renderOTP(); break;
                case 'home': html = renderHome(); break;
                case 'productDetail': html = renderProductDetail(data); break;
                case 'cart': html = renderCart(); break;
                case 'checkout': html = renderCheckout(); break;
                case 'payment': html = renderPayment(); break;
                case 'orderSuccess': html = renderOrderSuccess(data); break;
                case 'orders': html = renderOrders(); break;
                case 'orderDetail': html = renderOrderDetail(data); break;
                case 'profile': html = renderProfile(); break;
                default: html = '<div class="card"><p>Page not found</p></div>';
            }
        } catch(e) {
            html = `<div class="card" style="border:2px solid #ef4444;"><p style="color:#ef4444;">Error: ${e.message}</p></div>`;
        }
        render(html);
        
        if (page === 'home') loadProducts();
        if (page === 'orders') loadOrders();
        if (page === 'cart') updateBadge();
        if (page === 'payment') generateQRCode();
    }, 300);
}

function updateMenu() {
    if (userData) {
        document.getElementById('menuAvatar').textContent = userData.name ? userData.name.charAt(0).toUpperCase() : '👤';
        document.getElementById('menuName').textContent = userData.name || 'User';
        document.getElementById('menuEmail').textContent = userData.email || '';
    }
}

function toggleMenu() {
    document.getElementById('menuSidebar').classList.toggle('open');
    document.getElementById('menuOverlay').classList.toggle('show');
}

function closeMenu() {
    document.getElementById('menuSidebar').classList.remove('open');
    document.getElementById('menuOverlay').classList.remove('show');
}

// ============================================================
// LOGIN / REGISTER / OTP
// ============================================================
function renderLogin() {
    return `
        <div class="login-box">
            <div class="icon">🛍️</div>
            <h2>Welcome to PRL</h2>
            <p class="text-muted">Sign in to continue shopping</p>
            <input class="input" id="loginEmail" placeholder="Email" value="customer@prl.com">
            <input class="input" id="loginPassword" type="password" placeholder="Password" value="password123">
            <button class="btn btn-gold btn-block" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <button class="btn btn-secondary btn-block" onclick="navigateTo('register')"><i class="fas fa-user-plus"></i> Create Account</button>
            <div class="hint" style="margin-top:10px;">Demo: customer@prl.com / password123</div>
        </div>
    `;
}

function renderRegister() {
    return `
        <div class="login-box">
            <div class="icon">📝</div>
            <h2>Create Account</h2>
            <p class="text-muted">OTP will be sent to your email</p>
            <input class="input" id="regName" placeholder="Full Name" value="Customer">
            <input class="input" id="regEmail" type="email" placeholder="Email" value="customer@prl.com">
            <input class="input" id="regPassword" type="password" placeholder="Password (6+ chars)" value="password123">
            <input class="input" id="regPhone" placeholder="Phone" value="9876543210">
            <button class="btn btn-gold btn-block" onclick="handleRegister()"><i class="fas fa-paper-plane"></i> Send OTP</button>
            <button class="btn btn-secondary btn-block" onclick="navigateTo('login')">← Back to Login</button>
        </div>
    `;
}

function renderOTP() {
    return `
        <div class="login-box">
            <div class="icon">📧</div>
            <h2>Verify OTP</h2>
            <p class="text-muted">Enter the 6-digit code sent to <strong style="color:#D4AF37;">${tempEmail}</strong></p>
            <div class="otp-inputs">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,0)" id="otp0" inputmode="numeric">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,1)" id="otp1" inputmode="numeric">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,2)" id="otp2" inputmode="numeric">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,3)" id="otp3" inputmode="numeric">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,4)" id="otp4" inputmode="numeric">
                <input class="otp-box" maxlength="1" oninput="moveNext(this,5)" id="otp5" inputmode="numeric">
            </div>
            <button class="btn btn-gold btn-block" onclick="verifyOTP()"><i class="fas fa-check"></i> Verify</button>
            <button class="btn btn-secondary btn-block" onclick="resendOTP()"><i class="fas fa-redo"></i> Resend OTP</button>
            <button class="btn btn-secondary btn-block" onclick="navigateTo('register')">← Back</button>
        </div>
    `;
}

function moveNext(el, idx) {
    if (el.value.length === 1 && idx < 5) document.getElementById(`otp${idx+1}`).focus();
    let allFilled = true;
    for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`otp${i}`);
        if (!input || input.value.length !== 1) allFilled = false;
    }
    if (allFilled) verifyOTP();
}

// ============================================================
// AUTH FUNCTIONS
// ============================================================
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    if (!email || !pwd) { showToast('Fill all fields', 'error'); return; }
    try {
        await auth.signInWithEmailAndPassword(email, pwd);
        showToast('Welcome back! 🎉');
    } catch(e) { showToast(e.message, 'error'); }
}

async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const phone = document.getElementById('regPhone').value.trim();
    if (!name || !email || !pwd || !phone) { showToast('Fill all fields', 'error'); return; }
    if (pwd.length < 6) { showToast('Password 6+ chars', 'error'); return; }
    tempName = name; tempEmail = email; tempPassword = pwd; tempPhone = phone;
    
    generatedOTP = String(Math.floor(100000 + Math.random() * 900000));
    otpExpiry = Date.now() + 5 * 60 * 1000;
    showToast('📧 OTP sent to your email! (Demo: ' + generatedOTP + ')', 'success');
    navigateTo('otp');
}

async function verifyOTP() {
    let otp = '';
    for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`otp${i}`);
        if (input) otp += input.value;
    }
    if (otp.length !== 6) { showToast('Enter complete OTP', 'error'); return; }
    if (otp !== generatedOTP) { showToast('Invalid OTP', 'error'); return; }
    if (Date.now() > otpExpiry) { showToast('OTP expired', 'error'); return; }
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(tempEmail, tempPassword);
        await db.collection('users').doc(cred.user.uid).set({
            uid: cred.user.uid, name: tempName, email: tempEmail, phone: tempPhone,
            role: 'customer', createdAt: new Date().toISOString(), isOnline: true
        });
        showToast('🎉 Account created!');
    } catch(e) {
        if (e.code === 'auth/email-already-in-use') {
            showToast('Email already registered', 'error', 'Please login');
            navigateTo('login');
        } else { showToast(e.message, 'error'); }
    }
}

async function resendOTP() {
    generatedOTP = String(Math.floor(100000 + Math.random() * 900000));
    otpExpiry = Date.now() + 5 * 60 * 1000;
    showToast('📧 New OTP sent! (Demo: ' + generatedOTP + ')', 'success');
    for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`otp${i}`);
        if (input) input.value = '';
    }
    document.getElementById('otp0')?.focus();
}

async function logout() {
    if (!confirm('Logout?')) return;
    await auth.signOut();
    location.reload();
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome() {
    return `
        <div class="search-bar">
            <span class="icon"><i class="fas fa-search"></i></span>
            <input id="searchInput" placeholder="Search products..." oninput="filterProducts()">
        </div>
        
        <div class="categories-scroll">
            <div class="cat-item active" onclick="filterCategory('all',this)"><div class="icon">🔧</div><span class="label">All</span></div>
            <div class="cat-item" onclick="filterCategory('electronics',this)"><div class="icon">📱</div><span class="label">Electronics</span></div>
            <div class="cat-item" onclick="filterCategory('fashion',this)"><div class="icon">👕</div><span class="label">Fashion</span></div>
            <div class="cat-item" onclick="filterCategory('grocery',this)"><div class="icon">🍎</div><span class="label">Grocery</span></div>
            <div class="cat-item" onclick="filterCategory('home',this)"><div class="icon">🏠</div><span class="label">Home</span></div>
            <div class="cat-item" onclick="filterCategory('beauty',this)"><div class="icon">💄</div><span class="label">Beauty</span></div>
        </div>
        
        <div id="bannerContainer"></div>
        
        <div id="productGrid" class="product-grid"></div>
    `;
}

// ============================================================
// PRODUCT FUNCTIONS
// ============================================================
async function loadProducts() {
    try {
        const snap = await db.collection('products').get();
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (allProducts.length === 0) await seedProducts();
        displayProducts(allProducts);
        showBanner();
    } catch(e) {
        document.getElementById('productGrid').innerHTML = '<p class="text-muted text-center">Error loading products</p>';
    }
}

async function seedProducts() {
    const products = [
        { name: "Arduino Uno R3", price: 200, mrp: 399, category: "electronics", image: "https://images.unsplash.com/photo-1620287341056-49a2f1ab2fdc?w=400&h=400&fit=crop", description: "Arduino Uno R3 board with USB cable. Open-source microcontroller board based on ATmega328P.", rating: 4.8 },
        { name: "Wireless Earbuds Pro", price: 1499, mrp: 2999, category: "electronics", image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=400&h=400&fit=crop", description: "Premium wireless earbuds with noise cancellation and 24hr battery life.", rating: 4.6 },
        { name: "Organic T-Shirt", price: 599, mrp: 1299, category: "fashion", image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=400&fit=crop", description: "100% organic cotton t-shirt, soft and breathable fabric.", rating: 4.4 },
        { name: "Fresh Grocery Bundle", price: 899, mrp: 1499, category: "grocery", image: "https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&h=400&fit=crop", description: "Fresh organic fruits and vegetables delivered fresh.", rating: 4.7 },
        { name: "Home Decor Set", price: 1299, mrp: 2499, category: "home", image: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=400&h=400&fit=crop", description: "Premium home decor items to beautify your living space.", rating: 4.3 },
        { name: "Smart Watch Series 6", price: 4999, mrp: 9999, category: "electronics", image: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400&h=400&fit=crop", description: "Advanced smartwatch with health tracking and GPS.", rating: 4.5 }
    ];
    for (const p of products) await db.collection('products').add({ ...p, createdAt: new Date().toISOString() });
    showToast('Products loaded! 🎉');
}

function displayProducts(products) {
    const grid = document.getElementById('productGrid');
    if (!grid) return;
    if (!products || products.length === 0) {
        grid.innerHTML = '<div class="card"><p class="text-muted text-center">No products found</p></div>';
        return;
    }
    grid.innerHTML = products.map((p, i) => {
        const discount = p.mrp ? Math.round(((p.mrp - p.price) / p.mrp) * 100) : 0;
        const imgUrl = p.image || p.images?.[0] || '';
        return `
            <div class="product-card" onclick="viewProduct('${p.id}')">
                <div class="img">
                    ${imgUrl ? `<img src="${imgUrl}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>📦</span>'">` : `<span class="fallback">📦</span>`}
                    ${discount > 40 ? `<span class="discount-badge">${discount}% OFF</span>` : ''}
                </div>
                <div class="info">
                    <div class="name">${p.name}</div>
                    <div class="price-row">
                        <span class="price">₹${p.price}</span>
                        <span class="mrp">₹${p.mrp || p.price}</span>
                    </div>
                    <div class="rating">⭐ ${p.rating || 4.5}</div>
                    <button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}')">Add to Cart</button>
                </div>
            </div>
        `;
    }).join('');
}

function showBanner() {
    const container = document.getElementById('bannerContainer');
    if (!container) return;
    
    const discounted = allProducts.filter(p => p.mrp && ((p.mrp - p.price) / p.mrp) > 0.4);
    if (discounted.length === 0) { container.innerHTML = ''; return; }
    
    const p = discounted[Math.floor(Math.random() * discounted.length)];
    const discount = Math.round(((p.mrp - p.price) / p.mrp) * 100);
    const imgUrl = p.image || p.images?.[0] || '';
    
    container.innerHTML = `
        <div class="banner" onclick="viewProduct('${p.id}')">
            <div class="offer">🔥 ${discount}% OFF</div>
            <div class="sub">${p.name}</div>
            <div class="price-tag">₹${p.price} <span class="mrp">₹${p.mrp}</span></div>
            <button class="btn-sm">Shop Now →</button>
            <div class="banner-img">
                ${imgUrl ? `<img src="${imgUrl}" onerror="this.parentElement.innerHTML='<span class=\\'fallback\\'>📦</span>'">` : `<span class="fallback">📦</span>`}
            </div>
            <span class="banner-label">BEST DEAL</span>
        </div>
    `;
}

function filterCategory(category, el) {
    document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
    const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.category === category);
    displayProducts(filtered);
    showBanner();
}

function filterProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));
    displayProducts(filtered);
    showBanner();
}

async function viewProduct(id) {
    try {
        const doc = await db.collection('products').doc(id).get();
        if (!doc.exists) { showToast('Product not found', 'error'); return; }
        productQty = 1;
        navigateTo('productDetail', { id: doc.id, ...doc.data() });
    } catch(e) { showToast(e.message, 'error'); }
}

// ============================================================
// PRODUCT DETAIL
// ============================================================
function renderProductDetail(p) {
    if (!p) return '<div class="card"><p>Product not found</p></div>';
    
    const discount = p.mrp ? Math.round(((p.mrp - p.price) / p.mrp) * 100) : 0;
    const images = p.images || [p.image || ''];
    const imgUrl = images[0] || p.image || '';
    
    return `
        <div class="card">
            <div class="detail-thumbs">
                ${images.map((img, idx) => `
                    <img src="${img}" class="thumb ${idx === 0 ? 'active' : ''}" onclick="changeImage(this, '${img}')" onerror="this.style.display='none'">
                `).join('')}
            </div>
            <div class="detail-img" id="mainImage">
                ${imgUrl ? `<img src="${imgUrl}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>📦</span>'">` : `<span class="fallback">📦</span>`}
            </div>
            <div class="detail-name">${p.name}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span class="detail-price">₹${p.price}</span>
                ${p.mrp ? `<span class="detail-mrp">₹${p.mrp}</span>` : ''}
                ${discount > 0 ? `<span class="detail-discount">${discount}% OFF</span>` : ''}
            </div>
            <div class="detail-rating">⭐ ${p.rating || 4.5}</div>
            <div class="detail-desc">${p.description || 'Premium quality product.'}</div>
            <div class="qty-selector">
                <button onclick="changeQty(-1)">-</button>
                <span id="qtyDisplay">1</span>
                <button onclick="changeQty(1)">+</button>
            </div>

async function addToCart(id) {
    if (!currentUser) { showToast('Please login first', 'error'); return; }
    try {
        const doc = await db.collection('products').doc(id).get();
        const p = doc.data();
        const existing = cart.find(c => c.id === id);
        if (existing) {
            existing.quantity += productQty || 1;
            await db.collection('users').doc(currentUser.uid).collection('cart').doc(id).update({ quantity: existing.quantity });
        } else {
            cart.push({ id, name: p.name, price: p.price, quantity: productQty || 1, image: p.image || p.images?.[0] || '' });
            await db.collection('users').doc(currentUser.uid).collection('cart').doc(id).set({ 
                name: p.name, price: p.price, quantity: productQty || 1, 
                image: p.image || p.images?.[0] || '' 
            });
        }
        updateBadge();
        showToast('Added to cart! 🛒');
    } catch(e) { showToast(e.message, 'error'); }
}

async function buyNow(id) { await addToCart(id); navigateTo('cart'); }

    const total = cart.reduce((s, c) => s + c.quantity, 0);

async function updateCartQty(id, delta) {
    const item = cart.find(c => c.id === id);
    if (!item) return;
    const newQty = item.quantity + delta;
    if (newQty <= 0) { await removeFromCart(id); return; }
    item.quantity = newQty;
    await db.collection('users').doc(currentUser.uid).collection('cart').doc(id).update({ quantity: newQty });
    updateBadge();
    navigateTo('cart');
}

async function removeFromCart(id) {
    cart = cart.filter(c => c.id !== id);
    await db.collection('users').doc(currentUser.uid).collection('cart').doc(id).delete();
    updateBadge();
    navigateTo('cart');
}

async function placeOrder() {
    const method = document.getElementById('paymentMethod').value;
    if (!method) { showToast('Select payment method', 'error'); return; }
    const { address, phone } = window._checkoutData || {};
    if (!address) { showToast('Checkout data missing', 'error'); return; }
    const subtotal = cart.reduce((s, c) => s + c.price * c.quantity, 0);
    const delivery = subtotal > 500 ? 0 : 49;
    const total = subtotal + delivery;
    try {
        const orderId = 'ORD' + Date.now().toString().slice(-8);
        const orderData = {
            id: orderId, userId: currentUser.uid, userEmail: currentUser.email,
            items: cart.map(c => ({ name: c.name, price: c.price, quantity: c.quantity, image: c.image })),
            subtotal, deliveryCharge: delivery, total, address, phone,
            paymentMethod: method, status: 'pending',
            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        };
        await db.collection('orders').doc(orderId).set(orderData);
        for (const c of cart) await db.collection('users').doc(currentUser.uid).collection('cart').doc(c.id).delete();
        cart = []; updateBadge();
        showToast('🎉 Order placed!');
        navigateTo('orderSuccess', orderData);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function loadOrders() {
    try {
        const snap = await db.collection('orders').where('userId', '==', currentUser.uid).get();
        ordersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        ordersCache.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        let html = '';
        if (ordersCache.length === 0) {
            html = '<p class="text-muted text-center">No orders yet</p>';
        } else {
            ordersCache.forEach(o => {
                const statusClass = `status-${o.status}`;
                html += `

                        <div class="flex-between">
                            <span class="id">#${o.id}</span>
                            <span class="status ${statusClass}">${o.status}</span>

                        <div class="detail">📅 ${o.createdAt ? new Date(o.createdAt).toLocaleDateString() : ''}</div>
                    </div>
                `;
            });
        }
        document.getElementById('ordersList').innerHTML = html;
    } catch(e) {
        document.getElementById('ordersList').innerHTML = '<p class="text-muted">Error loading orders</p>';
    }
}

// ============================================================
// HELP REQUEST MODAL
// ============================================================
function openRequestModal(type, orderId) {
    const titles = {
        cancel: 'Request to Cancel Order',
        address: 'Request to Change Delivery Address',
        phone: 'Request to Change Mobile Number'
    };
    const placeholders = {
        cancel: 'Reason for cancellation...',
        address: 'New delivery address...',
        phone: 'New mobile number...'
    };
    
    const modal = document.createElement('div');
    modal.className = 'request-modal show';
    modal.id = 'requestModal';
    modal.innerHTML = `
        <div class="modal-content">
            <button class="modal-close" onclick="closeRequestModal()">✕</button>
            <div class="modal-title">${titles[type]}</div>
            <p style="font-size:12px;color:#666;margin-bottom:6px;">✅ Auto-approved (Order is pending)</p>
            <textarea id="requestDesc" placeholder="${placeholders[type]}" rows="3"></textarea>
            <button class="btn btn-gold btn-block" onclick="submitRequest('${type}', '${orderId}')">
                <i class="fas fa-paper-plane"></i> Submit Request
            </button>
            <button class="btn btn-secondary btn-block" onclick="closeRequestModal()">Cancel</button>
        </div>
    `;
    document.body.appendChild(modal);
}

function closeRequestModal() {
    const modal = document.getElementById('requestModal');
    if (modal) modal.remove();
}

async function submitRequest(type, orderId) {
    const desc = document.getElementById('requestDesc').value.trim();
    if (!desc) { showToast('Please provide details', 'error'); return; }
    
    const order = ordersCache.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    
    // ✅ AUTO APPROVE - Sirf pending orders mein
    const request = {
        type: type === 'cancel' ? 'Cancel Order' : type === 'address' ? 'Change Address' : 'Change Phone',
        description: desc,
        status: 'approved',  // ✅ Auto approved!
        approvedAt: new Date().toISOString()
    };
    
    try {
        const helpRequests = order.helpRequests || [];
        helpRequests.push(request);
        
        // ✅ Order update with auto approval
        let updateData = { helpRequests: helpRequests };
        
        // ✅ Agar cancel request hai toh order cancel karo
        if (type === 'cancel') {
            updateData.status = 'cancelled';
            updateData.cancellationReason = desc;
            showToast('✅ Order cancelled!', 'warning');
        }
        
        await db.collection('orders').doc(orderId).update(updateData);
        showToast('✅ Request auto-approved!', 'success');
        closeRequestModal();
        navigateTo('orderDetail', orderId);
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    }
}

// ============================================================
// REVIEW MODAL
// ============================================================
function openReviewModal(orderId, itemIndex) {
    const order = ordersCache.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    const item = order.items[itemIndex];
    if (!item) { showToast('Item not found', 'error'); return; }
    
    const modal = document.createElement('div');
    modal.className = 'request-modal show';
    modal.id = 'reviewModal';
    modal.innerHTML = `
        <div class="modal-content">
            <button class="modal-close" onclick="closeReviewModal()">✕</button>
            <div class="modal-title">⭐ Review: ${item.name}</div>
            <div style="display:flex;gap:4px;font-size:28px;margin:8px 0;" id="starContainer">
                <span onclick="setReviewStar(1)" style="cursor:pointer;color:#ddd;">⭐</span>
                <span onclick="setReviewStar(2)" style="cursor:pointer;color:#ddd;">⭐</span>
                <span onclick="setReviewStar(3)" style="cursor:pointer;color:#ddd;">⭐</span>
                <span onclick="setReviewStar(4)" style="cursor:pointer;color:#ddd;">⭐</span>
                <span onclick="setReviewStar(5)" style="cursor:pointer;color:#ddd;">⭐</span>
            </div>
            <input type="hidden" id="reviewRating" value="0">
            <textarea id="reviewComment" placeholder="Share your experience..." rows="3"></textarea>
            <button class="btn btn-gold btn-block" onclick="submitReview('${orderId}', ${itemIndex})">
                <i class="fas fa-star"></i> Submit Review
            </button>
            <button class="btn btn-secondary btn-block" onclick="closeReviewModal()">Cancel</button>
        </div>
    `;
    document.body.appendChild(modal);
}

let reviewStar = 0;

function setReviewStar(val) {
    reviewStar = val;
    document.getElementById('reviewRating').value = val;
    const stars = document.querySelectorAll('#starContainer span');
    stars.forEach((s, i) => {
        s.style.color = i < val ? '#f59e0b' : '#ddd';
    });
}

function closeReviewModal() {
    const modal = document.getElementById('reviewModal');
    if (modal) modal.remove();
    reviewStar = 0;
}

async function submitReview(orderId, itemIndex) {
    const rating = parseInt(document.getElementById('reviewRating').value);
    const comment = document.getElementById('reviewComment').value.trim();
    
    if (rating === 0) { showToast('Please select a rating', 'error'); return; }
    if (!comment) { showToast('Please write a comment', 'error'); return; }
    
    const order = ordersCache.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    
    try {
        // Update order item review
        order.items[itemIndex].reviewed = true;
        order.items[itemIndex].review = { rating, comment, date: new Date().toISOString(), user: userData?.name || 'Customer' };
        
        await db.collection('orders').doc(orderId).update({ items: order.items });
        
        // Add review to product
        const productId = order.items[itemIndex].productId;
        if (productId) {
            const productDoc = await db.collection('products').doc(productId).get();
            if (productDoc.exists) {
                const product = productDoc.data();
                const reviews = product.reviews || [];
                reviews.push({
                    user: userData?.name || 'Anonymous',
                    rating: rating,
                    comment: comment,
                    date: new Date().toISOString()
                });
                const totalRating = reviews.reduce((sum, r) => sum + r.rating, 0);
                const avgRating = (totalRating / reviews.length).toFixed(1);
                await db.collection('products').doc(productId).update({
                    reviews: reviews,
                    rating: parseFloat(avgRating)
                });
            }
        }
        
        showToast('✅ Review submitted!', 'success');
        closeReviewModal();
        navigateTo('orderDetail', orderId);
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    }
}

// ============================================================
// DOWNLOAD INVOICE PDF
// ============================================================
function downloadInvoice(orderId) {
    const order = ordersCache.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    
    showToast('📄 Generating invoice...', 'info');
    
    const invoiceHtml = generateInvoiceHTML(order);
    const container = document.getElementById('invoiceContainer');
    if (container) {
        container.innerHTML = invoiceHtml;
        container.style.display = 'block';
    }
    
    setTimeout(() => {
        const element = document.getElementById('invoiceContent');
        if (!element) { showToast('Error generating invoice', 'error'); return; }
        
        const opt = {
            margin:        [10, 10, 10, 10],
            filename:      'Invoice_' + order.id + '.pdf',
            image:         { type: 'jpeg', quality: 0.98 },
            html2canvas:   { scale: 2, useCORS: true, logging: false },
            jsPDF:         { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save().then(function() {
            showToast('✅ Invoice downloaded!', 'success');
            if (container) container.style.display = 'none';
        }).catch(function(e) {
            showToast('Error downloading: ' + e.message, 'error');
            if (container) container.style.display = 'none';
        });
    }, 500);
}

auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userData = doc.data();
            } else {
                userData = { role: 'customer', name: 'User', email: user.email, phone: '' };
                await db.collection('users').doc(user.uid).set(userData);
            }
            const cartSnap = await db.collection('users').doc(user.uid).collection('cart').get();
            cart = cartSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            updateBadge();
            updateMenu();
            navigateTo('home');
        } catch(e) { console.error('Error:', e); navigateTo('home'); }
    } else {
        currentUser = null;
        userData = null;
        cart = [];
        showLogin();
    }
});
