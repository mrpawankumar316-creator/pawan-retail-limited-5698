// ============================================================
// TOAST NOTIFICATION
// ============================================================
function showToast(message, type = 'success', sub = '') {
    let existing = document.querySelector('.toast');
    if (existing) existing.remove();
    let icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
    let toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <div style="display:flex; align-items:center;">
            <span class="icon">${icons[type]}</span>
            <div>
                <div class="msg">${message}</div>
                ${sub ? `<div class="sub">${sub}</div>` : ''}
            </div>
        </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => { if(toast) toast.remove(); }, 3000);
}

function renderPage(html) {

function getDateString(d) {
    if (!d) return 'N/A';
    try { return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); } 
    catch(e) { return 'Invalid Date'; }
}

function getDateTime(d) {
    if (!d) return 'N/A';
    try { return new Date(d).toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); } 
    catch(e) { return 'Invalid Date'; }
}

function getTodayDate() {
    return new Date().toISOString().split('T')[0];
}

function getNextThreeDays() {
    let days = [];
    for (let i = 1; i <= 3; i++) {
        let date = new Date();
        date.setDate(date.getDate() + i);
        days.push(date);
    }
    return days;
}

// REGISTER - OTP SIRF EMAIL PAR (APP MEIN SHOW NAHI HOGA)
// ============================================================
async function registerUser() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const mobile = document.getElementById('regMobile').value.trim();
    const pwd = document.getElementById('regPassword').value.trim();
    
    if (!name || !email || !mobile || !pwd) { showToast('Error', 'error', 'Fill all fields'); return; }
    if (mobile.length !== 10) { showToast('Error', 'error', 'Enter 10 digit mobile'); return; }
    if (pwd.length < 6) { showToast('Error', 'error', 'Password min 6 chars'); return; }
    
    try {
        const methods = await auth.fetchSignInMethodsForEmail(email);
        if (methods.length > 0) { showToast('Email Used', 'error', 'Already registered'); return; }
    } catch(e) {}
    
    await loadBlockedUsers();
    const blocked = checkIfBlocked(email);
    if (blocked) { showToast('Cannot Register', 'error', 'Email is blocked'); return; }
    
    pendingUserData = { name, email, mobile, password: pwd };
    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    pendingOtp = otp;
    
    // OTP App mein nahi dikhega - sirf email par jaayega
    showToast('📧 Sending OTP...', 'info', 'Please check your email');
    
    const sent = await sendRealOTP(email, otp);
    
    if (sent) {
        showToast('✅ OTP Sent to Email', 'success', 'Check your inbox/spam folder');
    } else {
        showToast('❌ OTP Failed', 'error', 'Please try again');
        return;
    }
    
    document.getElementById('otpSection').style.display = 'block';
    document.querySelectorAll('.otp-box').forEach(inp => inp.value = '');
}

async function verifyOTP() {
    let entered = '';
    document.querySelectorAll('.otp-box').forEach(inp => entered += inp.value);
    if (entered.length !== 6) { showToast('Error', 'error', 'Enter all 6 digits'); return; }
    if (entered !== pendingOtp) { showToast('Error', 'error', 'Invalid OTP. Check your email.'); return; }
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(pendingUserData.email, pendingUserData.password);
        await db.collection('users').doc(cred.user.uid).set({
            uid: cred.user.uid,
            name: pendingUserData.name,
            email: pendingUserData.email,
            mobile: pendingUserData.mobile,
            prlCoins: 500,
            address: { flat: '', street: '', city: '', pincode: '' },
            photoURL: '',
            isGoogleUser: false
        });
        showToast('🎉 Account Created!', 'success', 'Welcome to Pawan Retail!');
        pendingOtp = null;
        pendingUserData = null;
    } catch(e) { showToast('Registration Failed', 'error', e.message); }
}

async function loadUserData() {
    if (!currentUser) return;
    try {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if (doc.exists) userData = doc.data();
        else {
            userData = {
                uid: currentUser.uid,
                name: currentUser.displayName || "User",
                email: currentUser.email,
                mobile: '',
                prlCoins: 500,
                address: { flat: '', street: '', city: '', pincode: '' },
                photoURL: currentUser.photoURL || '',
                isGoogleUser: false
            };
            await db.collection('users').doc(currentUser.uid).set(userData);
        }
        
        await loadBlockedUsers();
        const blocked = checkIfBlocked(userData.email);
        isBlocked = !!blocked;
        
        document.getElementById('menuName').textContent = userData.name || "User";
        document.getElementById('menuEmail').textContent = userData.email || '';
        document.getElementById('menuPoints').textContent = `⭐ ${userData.prlCoins||0} PRL Coins`;
        const avatar = document.getElementById('menuAvatar');
        if (userData.photoURL) avatar.innerHTML = `<img src="${userData.photoURL}">`;
        else avatar.textContent = userData.name ? userData.name.charAt(0).toUpperCase() : '👤';
        
        if (isBlocked) {
            renderPage(`
                <div class="blocked-banner">
                    <div class="icon">🚫</div>
                    <div class="title">Account Blocked</div>
                    <div class="reason">${blocked.reason}</div>
                    <div class="reason" style="font-size:11px; color:#818cf8; margin-top:4px;">Blocked on: ${blocked.date}</div>
                    <button class="btn btn-danger" onclick="logoutUser()" style="margin-top:12px;">Logout</button>
                </div>
            `);
        } else {
            navigateTo('home');
        }
    } catch(e) { console.error("Load user error:", e); }
}

async function loadBlockedUsers() {
    try {
        const snap = await db.collection('blockedUsers').get();
        blockedUsersCache = {};
        snap.forEach(doc => { blockedUsersCache[doc.id] = doc.data(); });
    } catch(e) { blockedUsersCache = {}; }
}

function checkIfBlocked(email) {
    return blockedUsersCache[email?.toLowerCase()] || null;
}

async function loadOffers() {
    try {
        const snap = await db.collection('offers').get();
        let html = '';
        if (snap.empty) {
            html = '<div class="premium-card"><p class="text-muted text-center">No offers available</p></div>';
        } else {
            let i = 0;
            snap.forEach(doc => {
                const d = doc.data();
                const isActive = d.startDate && d.endDate ? 
                    (new Date() >= new Date(d.startDate) && new Date() <= new Date(d.endDate)) : true;

function proceedToPayment(type) {
    if (type === 'movie') {
        const email = document.getElementById('movieEmail')?.value?.trim() || '';
        const mobile = document.getElementById('movieMobile')?.value?.trim() || '';
        const tickets = parseInt(document.getElementById('ticketCount')?.value) || 1;
        
        if (!selectedDate) { showToast('Error', 'error', 'Please select a date'); return; }
        if (!selectedTime) { showToast('Error', 'error', 'Please select a time'); return; }
        if (!email) { showToast('Error', 'error', 'Please enter email'); return; }
        if (mobile.length !== 10) { showToast('Error', 'error', 'Enter a valid 10-digit mobile number'); return; }
        if (tickets < 1 || tickets > 10) { showToast('Error', 'error', 'Tickets must be between 1-10'); return; }
        
        movieDetails = { date: selectedDate, time: selectedTime, tickets, email, mobile };
    } else {
        const flat = document.getElementById('addrFlat')?.value?.trim() || '';
        const street = document.getElementById('addrStreet')?.value?.trim() || '';
        const city = document.getElementById('addrCity')?.value?.trim() || '';
        const pincode = document.getElementById('addrPincode')?.value?.trim() || '';
        
        if (!flat || !street || !city || !pincode) {
            showToast('Error', 'error', 'Please fill all address fields');
            return;
        }
        if (pincode.length !== 6) {
            showToast('Error', 'error', 'Enter a valid 6-digit pincode');
            return;
        }
        movieDetails = null;
    }
    
    navigateTo('payment');
}

function updatePaymentSummary() {
    const originalPrice = selectedOffer?.price || 0;
    const coinPercent = parseInt(document.getElementById('prlCoinSelect')?.value) || 0;
    const couponDisc = appliedCoupon ? (appliedCoupon.discount / 100) * originalPrice : 0;
    const coinDisc = (coinPercent / 100) * originalPrice;
    
    const coinsUsed = Math.round(coinDisc);
    const prlCoinsUsedEl = document.getElementById('prlCoinsUsed');
    const couponDiscountAmountEl = document.getElementById('couponDiscountAmount');
    const finalAmountEl = document.getElementById('finalAmount');
    const couponDiscountRowEl = document.getElementById('couponDiscountRow');
    
    if (prlCoinsUsedEl) prlCoinsUsedEl.textContent = coinsUsed;
    if (couponDiscountAmountEl) couponDiscountAmountEl.textContent = Math.round(couponDisc);
    
    if (couponDisc > 0 && couponDiscountRowEl) {
        couponDiscountRowEl.style.display = 'flex';
    }
    
    const finalPrice = originalPrice - couponDisc - coinDisc;
    if (finalAmountEl) finalAmountEl.textContent = `₹${Math.round(finalPrice)}`;
}

async function applyCoupon() {
    const code = document.getElementById('couponInput')?.value?.trim()?.toUpperCase() || '';
    if (!code) { showToast('Error', 'error', 'Please enter a coupon code'); return; }
    
    try {
        const snapshot = await db.collection('coupons').where('code', '==', code).get();
        const couponMessageEl = document.getElementById('couponMessage');
        
        if (snapshot.empty) {
            if (couponMessageEl) couponMessageEl.innerHTML = '<span style="color:#ef4444;">❌ Invalid coupon code</span>';
            return;
        }
        
        const doc = snapshot.docs[0];
        const data = doc.data();
        
        if (data.expiry && new Date(data.expiry) < new Date()) {
            if (couponMessageEl) couponMessageEl.innerHTML = '<span style="color:#ef4444;">❌ Coupon expired</span>';
            return;
        }
        
        if (data.minOrder && selectedOffer.price < data.minOrder) {
            if (couponMessageEl) couponMessageEl.innerHTML = `<span style="color:#ef4444;">❌ Min order ₹${data.minOrder} required</span>`;
            return;
        }
        
        if (data.usedBy && data.usedBy.includes(currentUser.uid)) {
            if (couponMessageEl) couponMessageEl.innerHTML = '<span style="color:#ef4444;">❌ Coupon already used</span>';
            return;
        }
        
        appliedCoupon = { id: doc.id, ...data };
        if (couponMessageEl) couponMessageEl.innerHTML = `<span style="color:#10b981;">✅ Coupon applied! ${data.discount}% off</span>`;
        updatePaymentSummary();
        showToast('Coupon Applied', 'success', `${data.discount}% discount`);
    } catch(e) {
        const couponMessageEl = document.getElementById('couponMessage');
        if (couponMessageEl) couponMessageEl.innerHTML = '<span style="color:#ef4444;">❌ Error applying coupon</span>';
    }
}

async function confirmOrder() {
    const txnId = document.getElementById('transactionId')?.value?.trim() || '';
    if (txnId.length !== 12) {
        showToast('Error', 'error', 'Please enter a valid 12-digit Transaction ID');
        return;
    }
    
    if (!selectedPaymentMethod) {
        showToast('Error', 'error', 'Please select a payment method');
        return;
    }
    
    const originalPrice = selectedOffer.price;
    const coinPercent = parseInt(document.getElementById('prlCoinSelect')?.value) || 0;
    const couponDisc = appliedCoupon ? (appliedCoupon.discount / 100) * originalPrice : 0;
    const coinDisc = (coinPercent / 100) * originalPrice;
    const finalAmount = Math.round(originalPrice - couponDisc - coinDisc);
    const coinsUsed = Math.round(coinDisc);
    
    if (coinsUsed > (userData.prlCoins || 0)) {
        showToast('Error', 'error', "You don't have enough PRL Coins");
        return;
    }
    
    try {
        const orderId = 'ORD' + Date.now().toString().slice(-8);
        
        let address = null;
        if (!movieDetails) {
            const addrFlat = document.getElementById('addrFlat')?.value?.trim() || '';
            const addrStreet = document.getElementById('addrStreet')?.value?.trim() || '';
            const addrCity = document.getElementById('addrCity')?.value?.trim() || '';
            const addrPincode = document.getElementById('addrPincode')?.value?.trim() || '';
            address = { flat: addrFlat, street: addrStreet, city: addrCity, pincode: addrPincode };
        }
        
        const orderData = {
            orderId: orderId,
            offerTitle: selectedOffer.title,
            originalPrice: originalPrice,
            finalAmount: finalAmount,
            couponUsed: appliedCoupon ? appliedCoupon.code : null,
            couponDiscount: appliedCoupon ? appliedCoupon.discount : 0,
            prlCoinsUsed: coinsUsed,
            transactionId: txnId,
            paymentMethod: selectedPaymentMethod,
            status: 'pending',
            orderDate: new Date().toISOString(),
            type: selectedOffer.type || 'food',
            movieDetails: movieDetails,
            address: address,
            complaintFiled: false
        };
        
        await db.collection('users').doc(currentUser.uid).collection('orders').doc(orderId).set(orderData);
        
        if (coinsUsed > 0) {
            await db.collection('users').doc(currentUser.uid).update({
                prlCoins: firebase.firestore.FieldValue.increment(-coinsUsed)
            });
            userData.prlCoins -= coinsUsed;
        }
        
        if (appliedCoupon) {
            await db.collection('coupons').doc(appliedCoupon.id).update({
                usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
            });
        }
        
        const earnedCoins = Math.round(finalAmount * 0.05);
        if (earnedCoins > 0) {
            await db.collection('users').doc(currentUser.uid).update({
                prlCoins: firebase.firestore.FieldValue.increment(earnedCoins)
            });
            userData.prlCoins += earnedCoins;
        }
        
        showToast('🎉 Order Placed!', 'success', `Order ID: ${orderId}\nEarned ${earnedCoins} PRL Coins!`);
        selectedOffer = null;
        appliedCoupon = null;
        movieDetails = null;
        selectedPaymentMethod = null;
        navigateTo('orders');
    } catch(e) {
        showToast('Error', 'error', 'Failed to place order: ' + e.message);
    }
}

async function cancelOrder(orderId) {
    const reason = prompt("Enter reason for cancelling this order:");
    if (!reason) return;
    try {
        await db.collection('users').doc(currentUser.uid).collection('orders').doc(orderId).update({ 
            status: 'cancelled',
            cancelReason: reason,

async function submitComplaint() {
    let type = document.getElementById('complaintType')?.value?.trim() || '';
    const desc = document.getElementById('complaintDesc')?.value?.trim() || '';
    
    if (!type) {
        const selected = document.querySelector('.complaint-option.selected');

        await db.collection('users').doc(currentUser.uid).collection('complaints').add({
            orderId: 'N/A',

            status: 'pending',
            createdAt: new Date().toISOString()
        });

    } catch(e) { showToast('Error', 'error', e.message); }
}

// ============================================================
// GIFT CARD REDEEM
// ============================================================
async function redeemGiftCard() {
    const code = document.getElementById('giftCodeInput')?.value?.trim()?.toUpperCase() || '';
    if (!code) { showToast('Error', 'error', 'Please enter gift card code'); return; }
    
    try {
        const snapshot = await db.collection('giftCards').where('code', '==', code).get();
        if (snapshot.empty) { showToast('Error', 'error', 'Invalid gift card code'); return; }
        
        const doc = snapshot.docs[0];
        const data = doc.data();
        
        if (data.usedBy && data.usedBy.includes(currentUser.uid)) {
            showToast('Error', 'error', 'Gift card already redeemed');
            return;
        }
        
        await db.collection('giftCards').doc(doc.id).update({
            usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
        });
        
        await db.collection('users').doc(currentUser.uid).update({
            prlCoins: firebase.firestore.FieldValue.increment(data.points || 100)
        });
        userData.prlCoins += (data.points || 100);
        
        showToast('🎉 Redeemed!', 'success', `You earned ${data.points || 100} PRL Coins!`);
        navigateTo('prlcoins');
    } catch(e) { showToast('Error', 'error', e.message); }
}
