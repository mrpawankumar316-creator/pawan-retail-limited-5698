<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        .navbar {

        .permission-badge.pending {

        .admin-panel {

        .request-item {

        .request-item .user-info .name {

        .request-item .user-info .email {

        .request-actions {

        .btn-sm {
            padding: 4px 14px;

            border-radius: 6px;

            font-weight: 600;

            color: white;
        }
        
        .btn-sm.approve {

        }
        
        .btn-sm.approve:hover {

        }
        
        .btn-sm.deny {

        }
        
        .btn-sm.deny:hover {

        }
        
        .btn-sm.view {

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

                display: none;
            }
            .sidebar .menu-item {

            }

            }

            }

    </style>
</head>
<body>

<script>
// ==============================================================
// 1. CONFIGURATIONS
// ==============================================================
const firebaseConfig = {
    apiKey: "AIzaSyD9SrgH4rYKdWXeYqiYL0cdznzypNFqLks",
    authDomain: "pawan-retail-limited.firebaseapp.com",
    projectId: "pawan-retail-limited",
    storageBucket: "pawan-retail-limited.firebasestorage.app",
    messagingSenderId: "1055612499123",
    appId: "1:1055612499123:web:bcc80b1b73e19a3e1c6cc6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

// EmailJS
emailjs.init("3cUWXrfL9AhSkM5FA");
const EMAILJS_SERVICE = "Pawanretaillimited-5678";
const EMAILJS_TEMPLATE = "template_45qu30j";

// Blynk Config
const BLYNK_AUTH = "kt22R7H1FFa-qKeIpYJXKGkOgEl0tjR4";
const BLYNK_HOST = "blynk.cloud";
const BLYNK_PORT = 80;

// ==============================================================
// 2. GLOBAL STATE
// ==============================================================
let currentUser = null;
let currentUserData = null;
let currentRole = 'customer';
let currentUserId = null;
let pendingOTPEmail = '';
let pendingOTPPurpose = 'login';
let deviceStates = {1: 0, 2: 0, 3: 0, 4: 0};
let blynkConnected = false;
let blynkClient = null;
let deviceNames = {1: '9W Bulb', 2: '12W LED', 3: '60W Fan', 4: '20W Tubelight'};
let deviceWatts = {1: 9, 2: 12, 3: 60, 4: 20};
let permissionStatus = 'pending';
let isAdmin = false;
let historyUnsubscribe = null;
let deviceListener = null;

// ==============================================================
// 3. AUTH FUNCTIONS
// ==============================================================

function showLogin() {
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('otpForm').classList.add('hidden');
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
}

function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('otpForm').classList.add('hidden');
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
}

function showOTP(email, purpose) {
    pendingOTPEmail = email;
    pendingOTPPurpose = purpose;
    document.getElementById('otpEmailDisplay').textContent = email;
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('otpForm').classList.remove('hidden');
    document.getElementById('otpInput').value = '';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
}

function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
}

function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

async function sendOTPEmail(email, otp, name = 'User') {
    try {
        await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
            to_email: email,
            to_name: name,
            otp_code: otp,
            app_name: 'Smart Home'
        });
        return { success: true };
    } catch (error) {
        console.error('Email error:', error);
        return { success: false };
    }
}

async function storeOTP(email, otp) {
    await db.collection('otps').doc(email).set({
        otp: otp,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        expiresAt: new Date(Date.now() + 5 * 60 * 1000)
    });
}

async function verifyOTP(email, enteredOTP) {
    try {
        const doc = await db.collection('otps').doc(email).get();
        if (!doc.exists) return { success: false, message: 'OTP not found' };
        const data = doc.data();
        const expiry = data.expiresAt.toDate ? data.expiresAt.toDate() : new Date(data.expiresAt);
        if (new Date() > expiry) return { success: false, message: 'OTP expired' };
        if (data.otp !== enteredOTP) return { success: false, message: 'Invalid OTP' };
        await db.collection('otps').doc(email).delete();
        return { success: true };
    } catch (error) {
        return { success: false, message: error.message };
    }
}

// ----- REGISTER -----
async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!name || !email || !phone || !password) {
        showError('Please fill all fields');
        return;
    }
    if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
    }

    document.getElementById('registerBtn').disabled = true;
    document.getElementById('registerBtn').textContent = 'Creating...';

    try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection('users').doc(user.uid).set({
            uid: user.uid,
            name: name,
            email: email,
            phone: phone,
            role: 'customer',
            walletBalance: 0,
            isActive: true,
            permission: 'pending',
            devices: {1: 0, 2: 0, 3: 0, 4: 0},
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        const otp = generateOTP();
        await storeOTP(email, otp);
        await sendOTPEmail(email, otp, name);

        showSuccess('Account created! OTP sent to your email.');
        showOTP(email, 'register');

    } catch (error) {
        showError(error.message);
    }

    document.getElementById('registerBtn').disabled = false;
    document.getElementById('registerBtn').textContent = 'Register';
}

// ----- LOGIN -----
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showError('Please fill all fields');
        return;
    }

    document.getElementById('loginBtn').disabled = true;
    document.getElementById('loginBtn').textContent = 'Logging in...';

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        const doc = await db.collection('users').doc(user.uid).get();
        if (!doc.exists) {
            showError('User profile not found');
            return;
        }
        const userData = doc.data();

        if (!userData.isActive) {
            showError('Account deactivated. Contact admin.');
            return;
        }

        const otp = generateOTP();
        await storeOTP(email, otp);
        await sendOTPEmail(email, otp, userData.name);

        showSuccess('OTP sent to your email!');
        showOTP(email, 'login');

    } catch (error) {
        showError(error.message);
    }

    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Login';
}

// ----- VERIFY OTP -----
async function handleOTPVerify() {
    const otp = document.getElementById('otpInput').value.trim();
    if (!otp || otp.length !== 6) {
        showError('Please enter 6-digit OTP');
        return;
    }

    document.getElementById('otpVerifyBtn').disabled = true;
    document.getElementById('otpVerifyBtn').textContent = 'Verifying...';

    try {
        const result = await verifyOTP(pendingOTPEmail, otp);
        if (!result.success) {
            showError(result.message);
            document.getElementById('otpVerifyBtn').disabled = false;
            document.getElementById('otpVerifyBtn').textContent = 'Verify OTP';
            return;
        }

        if (pendingOTPPurpose === 'register') {
            showSuccess('Email verified! Please login.');
            showLogin();
            document.getElementById('otpVerifyBtn').disabled = false;
            document.getElementById('otpVerifyBtn').textContent = 'Verify OTP';
            return;
        }

        // Login complete - load dashboard
        const q = await db.collection('users').where('email', '==', pendingOTPEmail).get();
        if (q.empty) {
            showError('User not found');
            return;
        }
        const userData = q.docs[0].data();
        const uid = q.docs[0].id;

        currentUserId = uid;
        currentUserData = userData;
        currentRole = userData.role || 'customer';
        permissionStatus = userData.permission || 'pending';
        isAdmin = currentRole === 'admin';

        // Load device states
        if (userData.devices) {
            deviceStates = userData.devices;
        }

        await db.collection('users').doc(uid).update({
            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        });

        showDashboard();

    } catch (error) {
        showError(error.message);
    }

    document.getElementById('otpVerifyBtn').disabled = false;
    document.getElementById('otpVerifyBtn').textContent = 'Verify OTP';
}

// ----- RESEND OTP -----
async function resendOTP() {
    if (!pendingOTPEmail) return;
    try {
        const otp = generateOTP();
        await storeOTP(pendingOTPEmail, otp);
        await sendOTPEmail(pendingOTPEmail, otp, 'User');
        showSuccess('New OTP sent!');
    } catch (error) {
        showError('Failed to resend OTP');
    }
}

// ----- LOGOUT -----
async function logoutUser() {
    try {
        if (blynkClient) {
            blynkClient.disconnect();
            blynkClient = null;
        }
        if (deviceListener) {
            deviceListener();
            deviceListener = null;
        }
        if (historyUnsubscribe) {
            historyUnsubscribe();
            historyUnsubscribe = null;
        }
        await auth.signOut();
        currentUser = null;
        currentUserData = null;
        currentUserId = null;
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('appContainer').style.display = 'none';
        showLogin();
    } catch (error) {
        console.error('Logout error:', error);
    }
}

function initBlynk() {
    try {
        // Blynk using REST API calls (simpler approach)
        blynkConnected = true;
        document.getElementById('blynkStatus').className = 'blynk-status online';
        document.getElementById('blynkStatus').textContent = 'Blynk: Online';
        console.log('Blynk connected');
        return true;
    } catch (error) {
        console.error('Blynk error:', error);
        blynkConnected = false;
        document.getElementById('blynkStatus').className = 'blynk-status offline';
        document.getElementById('blynkStatus').textContent = 'Blynk: Offline';
        return false;
    }
}

async function sendBlynkCommand(pin, value) {
    try {
        const url = `https://${BLYNK_HOST}/external/api/update/V${pin}?value=${value}&token=${BLYNK_AUTH}`;
        const response = await fetch(url);
        if (response.ok) {
            console.log(`Blynk V${pin} set to ${value}`);
            return true;
        }
        return false;
    } catch (error) {
        console.error('Blynk send error:', error);
        return false;
    }
}

async function toggleDevice(deviceId) {
    if (permissionStatus !== 'approved') {
        alert('❌ You need admin approval to control devices!');
        return;
    }
    
    if (!blynkConnected) {
        alert('⚠️ Blynk is offline! Device will not work.');
        return;
    }

    const newState = deviceStates[deviceId] === 0 ? 1 : 0;
    deviceStates[deviceId] = newState;

    // Update UI
    updateDeviceUI(deviceId);
    updateStats();

    // Send to Blynk
    const blynkResult = await sendBlynkCommand(deviceId, newState);
    if (!blynkResult) {
        console.warn('Blynk command failed');
    }

    // Save to Firestore
    try {
        const updateData = {};
        updateData['devices.' + deviceId] = newState;
        await db.collection('users').doc(currentUserId).update(updateData);

        // Save to history
        const action = newState === 1 ? 'ON' : 'OFF';
        await db.collection('users').doc(currentUserId)
            .collection('history').add({
                device: deviceNames[deviceId],
                action: action,
                time: new Date().toLocaleString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                }),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

    } catch (error) {
        console.error('Save error:', error);
    }
}

function updateDeviceUI(deviceId) {
    const state = deviceStates[deviceId];
    const card = document.getElementById('deviceCard' + deviceId);
    const status = document.getElementById('deviceStatus' + deviceId);
    const toggle = document.getElementById('deviceToggle' + deviceId);

    if (card) {
        card.className = `device-card ${state === 1 ? 'on' : 'off'} ${permissionStatus !== 'approved' ? 'disabled' : ''}`;
    }
    if (status) {
        status.className = `device-status ${state === 1 ? 'on' : 'off'}`;
        status.textContent = state === 1 ? 'ON' : 'OFF';
    }
    if (toggle) {
        toggle.className = `toggle-switch ${state === 1 ? 'active' : ''}`;
    }
}

function updateStats() {
    const totalOn = Object.values(deviceStates).filter(v => v === 1).length;
    const totalPower = Object.keys(deviceStates).reduce((sum, key) => {
        return sum + (deviceStates[key] === 1 ? deviceWatts[key] : 0);
    }, 0);

    const statOn = document.getElementById('statTotalOn');
    if (statOn) statOn.textContent = `${totalOn}/4`;
    
    const statPower = document.getElementById('statTotalPower');
    if (statPower) statPower.textContent = `${totalPower}W`;
    
    const totalPowerDisplay = document.getElementById('totalPowerDisplay');
    if (totalPowerDisplay) totalPowerDisplay.textContent = totalPower;
}

function loadDeviceStates() {
    if (!currentUserId) return;

    // Listen to device changes in real-time
    deviceListener = db.collection('users').doc(currentUserId)
        .onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.devices) {
                    deviceStates = data.devices;
                    permissionStatus = data.permission || 'pending';
                    // Update UI for all devices
                    Object.keys(deviceStates).forEach(id => updateDeviceUI(parseInt(id)));
                    updateStats();
                }
            }
        });
}

function loadPageData(pageName) {
    if (pageName === 'history') {
        loadHistory();
    }
    if (pageName === 'admin') {
        loadPendingRequests();
    }
}

async function loadHistory() {
    const historyList = document.getElementById('historyList');
    if (!historyList) return;

    try {
        const snapshot = await db.collection('users').doc(currentUserId)
            .collection('history')
            .orderBy('timestamp', 'desc')
            .limit(20)
            .get();

        if (snapshot.empty) {
            historyList.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">No history yet</div>';
            return;
        }

        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `
                <div class="history-item">
                    <span><span class="action ${data.action.toLowerCase()}">${data.action}</span> ${data.device}</span>
                    <span class="time">${data.time || 'Just now'}</span>
                </div>
            `;
        });
        historyList.innerHTML = html;

    } catch (error) {
        console.error('Load history error:', error);
        historyList.innerHTML = '<div style="text-align:center;color:red;padding:20px;">Error loading history</div>';
    }
}

    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);
    document.getElementById('otpVerifyBtn').addEventListener('click', handleOTPVerify);
    
    document.getElementById('loginPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('regPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleRegister();
    });
    document.getElementById('otpInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleOTPVerify();
    });

    showLogin();
    console.log('🚀 Smart Home App Loaded!');
});

// ==============================================================
// 12. AUTH STATE LISTENER
// ==============================================================

auth.onAuthStateChanged(async (user) => {
    if (user) {
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                currentUserId = user.uid;
                currentUserData = data;
                currentRole = data.role || 'customer';
                permissionStatus = data.permission || 'pending';
                isAdmin = currentRole === 'admin';
                if (data.devices) {
                    deviceStates = data.devices;
                }
                showDashboard();
            } else {
                await auth.signOut();
                document.getElementById('authContainer').style.display = 'block';
                document.getElementById('appContainer').style.display = 'none';
                showLogin();
            }
        } catch (error) {
            console.error('Auth listener error:', error);
        }
    } else {
        document.getElementById('authContainer').style.display = 'block';
        document.getElementById('appContainer').style.display = 'none';
        showLogin();
    }
});
</script>
