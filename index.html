<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pawan Retail Limited • Complete Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2e0 0%, #c8e6c9 100%);
            min-height: 100vh;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        .animate-slide-left { animation: slideInLeft 0.5s ease forwards; }
        .animate-bounce { animation: bounceIn 0.5s ease forwards; }
        .animate-pulse { animation: pulse 2s infinite; }

        .premium-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        .premium-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .logo {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 2s infinite;
            background-size: 200% auto;
        }
        .menu-icon {
            background: rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .content-area {
            padding: 16px;
            background: #f8fafc;
            min-height: 500px;
        }

        .premium-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.15);
            cursor: pointer;
            transition: all 0.3s;
        }
        .premium-card:active { transform: scale(0.98); }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .badge-hot { background: linear-gradient(135deg, #FF6B6B, #EE5A24); color: white; }
        .badge-cinema { background: linear-gradient(135deg, #8E44AD, #9B59B6); color: white; }
        .badge-flash { background: linear-gradient(135deg, #3498DB, #2980B9); color: white; }

        .offer-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
        .offer-price { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #1a1a2e, #D4AF37); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 8px 0; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a2e; }
        .btn-secondary { background: #f0f0f0; color: #1a1a2e; border: 1px solid #e0e0e0; }
        .btn-cancel { background: #fee2e2; color: #dc2626; }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 40px;
            font-size: 14px;
            margin: 8px 0;
            background: #fafafa;
        }
        .input-field:focus { outline: none; border-color: #D4AF37; }

        .banner-container {
            margin-bottom: 16px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .banner-slider {
            display: flex;
            transition: transform 0.5s ease;
        }
        .banner-item {
            min-width: 100%;
            padding: 30px 20px;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: white;
            text-align: center;
        }
        .banner-item h3 { font-size: 20px; margin-bottom: 8px; }
        .banner-item p { font-size: 12px; opacity: 0.9; }
        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 0;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.3);
        }
        .banner-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .banner-dot.active { background: white; width: 20px; border-radius: 10px; }

        .order-card {
            background: white;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid #D4AF37;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-cancelled { background: #ffebee; color: #e74c3c; }
        .status-delivered { background: #e8f5e9; color: #4caf50; }

        .complaint-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #ff9800;
        }

        .menu-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 1501;
            transition: left 0.3s;
            padding: 20px;
        }
        .menu-sidebar.open { left: 0; }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
        }
        .menu-overlay.show { display: block; }
        .menu-item {
            background: #fafafa;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .menu-item:hover { background: rgba(212,175,55,0.1); }
        .menu-header { text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #D4AF37; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }

        .price-breakdown { background: #f8f9fa; padding: 15px; border-radius: 20px; margin: 12px 0; }
        .total-amount { font-size: 20px; font-weight: 800; color: #D4AF37; border-top: 2px dashed #e0e0e0; padding-top: 12px; margin-top: 8px; }

        .center-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5000;
            animation: bounceIn 0.5s ease;
        }
        .popup-content {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            text-align: center;
            min-width: 280px;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .popup-content h3 { font-size: 22px; margin-bottom: 12px; }
        .popup-content p { margin-bottom: 20px; color: #666; }
        .popup-content button {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            color: #1a1a2e;
        }
        .popup-success { border-top: 5px solid #4caf50; }
        .popup-error { border-top: 5px solid #e74c3c; }

        .prl-coins-card {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .prl-coins-value { font-size: 52px; font-weight: 800; margin: 10px 0; }
        
        .coin-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .coin-option {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .coin-option.selected {
            background: #D4AF37;
            color: white;
            border-color: #D4AF37;
        }

        .payment-methods-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        .payment-method-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #e0e0e0;
        }
        .payment-method-card .logo-img {
            width: 40px;
            height: 40px;
            margin: 0 auto 5px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .phonepe-logo { background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/PhonePe_Logo.svg/1200px-PhonePe_Logo.svg.png'); background-size: contain; }
        .paytm-logo { background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Paytm_Logo.svg/1200px-Paytm_Logo.svg.png'); background-size: contain; }
        .gpay-logo { background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Google_Pay_Logo.svg/1200px-Google_Pay_Logo.svg.png'); background-size: contain; }
        .bhim-logo { background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/BHIM_Logo.svg/1200px-BHIM_Logo.svg.png'); background-size: contain; }
        
        .qr-container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            margin: 15px 0;
            cursor: pointer;
            border: 2px dashed #D4AF37;
        }
        .upi-id-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
        }
        .copy-btn { background: none; border: none; font-size: 16px; cursor: pointer; }
        
        .advantage-list {
            list-style: none;
            padding: 0;
        }
        .advantage-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .advantage-icon { font-size: 24px; min-width: 40px; }
        
        .contact-info-footer {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: center;
            color: white;
        }
        .contact-info-footer p { margin: 5px 0; font-size: 12px; }
        .contact-info-footer strong { color: #D4AF37; }
        
        /* Movie Ticket Page */
        .movie-ticket-page {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .movie-ticket-page h2 {
            color: #D4AF37;
            margin-bottom: 16px;
        }
        .theatre-info {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
        }
        .time-slots {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .time-slot {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 30px;
            cursor: pointer;
        }
        .time-slot.selected {
            background: #D4AF37;
            color: white;
            border-color: #D4AF37;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div id="dynamicPage">Loading...</div>
</div>

<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>
<div id="menuSidebar" class="menu-sidebar">
    <div class="menu-header">
        <div style="font-size: 40px;">👤</div>
        <div id="menuName" style="font-weight: 800;">User</div>

    </div>
    <div class="menu-item" onclick="showHome(); closeMenu()">🏠 Home</div>
    <div class="menu-item" onclick="showOrders(); closeMenu()">📦 My Orders</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
    // Initialize Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDzgIrjcWwnqS5e3lDplptyU6VDSngn7_o",
        authDomain: "pawan-8388d.firebaseapp.com",
        projectId: "pawan-8388d",
        storageBucket: "pawan-8388d.firebasestorage.app",
        messagingSenderId: "522473603051",
        appId: "1:522473603051:web:519543c829c1eefd1523ae"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    emailjs.init("3cUWXrfL9AhSkM5FA");
    
    let currentUser = null, userData = null, selectedOffer = null;
    let appliedCoupon = null, appliedGiftCard = null;
    let usePRLCoins = false;
    let selectedCoinAmount = 0;
    let currentBanner = 0;
    let movieDetails = null;
    
    const banners = [
        { title: "🎬 Movie Ticket Offer!", desc: "Book tickets at Bokaro PVR" },
        { title: "🍕 Pizza Mania!", desc: "Get 3 pizzas at just ₹141" },
        { title: "⚡ Flash Sale!", desc: "50% off on electronics" }
    ];
    
    const timeSlots = ["10:00 AM", "1:00 PM", "4:00 PM", "7:00 PM", "10:00 PM"];
    
    const theatreInfo = {
        name: "🎬 PVR Cinemas - Bokaro",
        address: "The Bokaro Mall, Sector 3C, Bokaro Steel City, Jharkhand - 827001"
    };
    
    function showCenterPopup(title, message, type = 'info') {
        let existingPopup = document.querySelector('.center-popup');
        if (existingPopup) existingPopup.remove();
        let popup = document.createElement('div');
        popup.className = 'center-popup';
        let icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : 'ℹ️');
        popup.innerHTML = `<div class="popup-content popup-${type}"><h3>${icon} ${title}</h3><p>${message}</p><button onclick="this.parentElement.parentElement.remove()">OK</button></div>`;
        document.body.appendChild(popup);
        setTimeout(() => { if(popup) popup.remove(); }, 5000);
    }
    
    function showToast(msg) {
        showCenterPopup("Notification", msg, "info");
    }
    
    function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    
    async function sendOTPEmail(email, otp, type) {
        try {
            await emailjs.send("Pawanretaillimited-5678", "template_45qu30j", { to_email: email, otp: otp, type: type });
            return true;
        } catch(e) { return false; }
    }
    
    async function loadUserData() {
        if (!currentUser) return true;
        try {
            let snap = await db.collection("users").doc(currentUser.uid).get();
            if (snap.exists) {
                userData = snap.data();
                if (userData.isBlocked === true) {
                    showCenterPopup("Account Blocked", "Contact: thepawanretaillimited@gmail.com", "error");
                    await auth.signOut();
                    showLoginPage();
                    return false;
                }
            } else {
                userData = { name: "User", email: currentUser.email, prlCoins: 500, address: {} };
                await db.collection("users").doc(currentUser.uid).set(userData);
            }
            document.getElementById('menuName').innerHTML = userData.name || "User";
            document.getElementById('menuPoints').innerHTML = `⭐ ${userData.prlCoins || 0} pts`;
            return true;
        } catch(e) { return true; }
    }
    
    async function seedData() {
        try {
            let off = await db.collection("offers").get();
            if (off.empty) {
                let futureDate = new Date();
                futureDate.setDate(futureDate.getDate() + 30);
                await db.collection("offers").add({ title: "🍕 3 Classic Pizzas", desc: "Dominos Special", price: 141, badge: "HOT", type: "food", expiryTime: futureDate });
                await db.collection("offers").add({ title: "🎬 Pushpa 2 - Movie Ticket", desc: "Bokaro PVR Cinema", price: 299, badge: "CINEMA", type: "movie", expiryTime: futureDate });
                await db.collection("offers").add({ title: "⚡ 50% OFF Electronics", desc: "Headphones", price: 499, badge: "FLASH", type: "electronics", expiryTime: futureDate });
            }
            let cp = await db.collection("coupons").get();
            if (cp.empty) {
                await db.collection("coupons").add({ code: "SAVE50", discount: 50, isActive: true, usedBy: [], expiresAt: new Date("2026-12-31") });
                await db.collection("coupons").add({ code: "WELCOME100", discount: 100, isActive: true, usedBy: [], expiresAt: new Date("2026-12-31") });
            }
            let gc = await db.collection("giftCards").get();
            if (gc.empty) {
                await db.collection("giftCards").add({ code: "PRL100", points: 100, isActive: true, usedBy: [], expiresAt: new Date("2026-12-31") });
                await db.collection("giftCards").add({ code: "PRL500", points: 500, isActive: true, usedBy: [], expiresAt: new Date("2026-12-31") });
            }
        } catch(e) { console.error(e); }
    }
    
    function toggleMenu() {
        document.getElementById('menuSidebar').classList.add('open');
        document.getElementById('menuOverlay').classList.add('show');
    }
    function closeMenu() {
        document.getElementById('menuSidebar').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('show');
    }
    
    function startBannerSlider() {
        setInterval(() => {
            currentBanner = (currentBanner + 1) % banners.length;
            let slider = document.getElementById('bannerSlider');
            if (slider) slider.style.transform = `translateX(-${currentBanner * 100}%)`;
            document.querySelectorAll('.banner-dot').forEach((dot, i) => {
                if (i === currentBanner) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }, 3000);
    }
    
    function getCoinOptions(amount) {
        let tenPercent = Math.floor(amount * 0.1);
        let options = [0];
        if (tenPercent >= 5) options.push(tenPercent);
        if (tenPercent >= 10) options.push(tenPercent * 2);
        return [...new Set(options)].sort((a,b) => a-b);
    }
    
    function getNextThreeDays() {
        let days = [];
        let today = new Date();
        for (let i = 0; i < 3; i++) {
            let date = new Date();
            date.setDate(today.getDate() + i);
            days.push({ dateStr: date.toISOString().split('T')[0], dayName: date.toLocaleDateString('en-IN', { weekday: 'short' }), dateNum: date.getDate(), month: date.toLocaleDateString('en-IN', { month: 'short' }) });
        }
        return days;
    }
    
    async function showHome() {
        await loadUserData();
        let offersSnap = await db.collection("offers").get();
        let html = `
            <div class="premium-header">
                <div class="header-top">
                    <div class="logo">PAWAN<span>RETAIL LIMITED</span></div>
                    <div class="menu-icon" onclick="toggleMenu()">☰</div>
                </div>
            </div>
            <div class="content-area">
                <div class="banner-container">
                    <div class="banner-slider" id="bannerSlider">
                        ${banners.map(b => `<div class="banner-item"><h3>${b.title}</h3><p>${b.desc}</p></div>`).join('')}
                    </div>
                    <div class="banner-dots">
                        ${banners.map((_, i) => `<div class="banner-dot ${i === 0 ? 'active' : ''}"></div>`).join('')}
                    </div>
                </div>
                <h3 style="color: #D4AF37; margin-bottom: 12px;">🔥 Hot Offers</h3>
        `;
        for (let doc of offersSnap.docs) {
            let o = doc.data();
            let badgeClass = o.badge === 'HOT' ? 'badge-hot' : (o.badge === 'CINEMA' ? 'badge-cinema' : 'badge-flash');
            html += `
                <div class="premium-card animate-slide-left" onclick="selectOffer('${doc.id}', '${o.title}', ${o.price}, '${o.type}')">
                    <span class="badge ${badgeClass}">${o.badge}</span>
                    <div class="offer-title">${o.title}</div>
                    <div class="offer-price">₹${o.price}</div>
                    <button class="btn btn-primary" onclick="event.stopPropagation(); selectOffer('${doc.id}', '${o.title}', ${o.price}, '${o.type}')">Book Now →</button>
                </div>
            `;
        }
        html += `</div>`;
        document.getElementById('dynamicPage').innerHTML = html;
        startBannerSlider();

    window.placeOrder = async function(finalAmount, isFree) {
        if (!isFree) {
            let txnId = document.getElementById('transactionId').value.trim();
            if (!txnId) { showCenterPopup("Error", "Enter Transaction ID", "error"); return; }
            if (!/^\d{12}$/.test(txnId)) { showCenterPopup("Error", "Transaction ID must be 12 digits", "error"); return; }
        }
        try {
            if (appliedCoupon) {
                await db.collection("coupons").doc(appliedCoupon.docId).update({ usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            }
            if (appliedGiftCard) {
                await db.collection("giftCards").doc(appliedGiftCard.docId).update({ usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            }
            let coinUsed = 0;
            if (usePRLCoins && selectedCoinAmount > 0) {
                coinUsed = Math.min(selectedCoinAmount, userData?.prlCoins || 0);
                await db.collection("users").doc(currentUser.uid).update({ prlCoins: (userData?.prlCoins || 0) - coinUsed });
                userData.prlCoins -= coinUsed;
            }
            let orderId = "ORD" + Date.now();
            let orderData = {
                orderId, offerTitle: selectedOffer.title, originalPrice: selectedOffer.price, finalAmount,
                couponUsed: appliedCoupon?.code || null, giftCardUsed: appliedGiftCard?.code || null,
                prlCoinsUsed: coinUsed, transactionId: isFree ? "FREE" : document.getElementById('transactionId').value,
                status: "pending", orderDate: new Date(),
                type: selectedOffer.type,
                movieDetails: selectedOffer.type === 'movie' ? movieDetails : null,
                address: selectedOffer.type === 'movie' ? null : userData.address
            };
            await db.collection("users").doc(currentUser.uid).collection("orders").add(orderData);
            showCenterPopup("Success", `Order placed! ID: ${orderId.slice(0,12)}`, "success");
            let pointsEarned = Math.floor(finalAmount * 0.05);
            if (pointsEarned > 0) {
                await db.collection("users").doc(currentUser.uid).update({ prlCoins: (userData?.prlCoins || 0) + pointsEarned });
                userData.prlCoins += pointsEarned;
            }
            appliedCoupon = null; appliedGiftCard = null; usePRLCoins = false; selectedCoinAmount = 0;
            movieDetails = null;
            showOrders();
        } catch(e) { showCenterPopup("Error", e.message, "error"); }
    };

    window.redeemGiftCard = async function() {
        let code = document.getElementById('redeemCode').value.trim().toUpperCase();
        if (!code) { showCenterPopup("Error", "Enter code", "error"); return; }
        let qSnapshot = await db.collection("giftCards").where("code", "==", code).get();
        if (qSnapshot.empty) { showCenterPopup("Error", "Invalid code", "error"); return; }
        let doc = qSnapshot.docs[0];
        let data = doc.data();
        if ((data.usedBy || []).includes(currentUser.uid)) { showCenterPopup("Error", "Already used", "error"); return; }
        let newCoins = (userData?.prlCoins || 0) + data.points;
        await db.collection("users").doc(currentUser.uid).update({ prlCoins: newCoins });
        await db.collection("giftCards").doc(doc.id).update({ usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
        userData.prlCoins = newCoins;
        showCenterPopup("Success", `${data.points} Coins added!`, "success");
        showPRLCoins();
    };

    function getOtpFromBoxes() { let otp = ''; for (let i = 0; i < 6; i++) { let box = document.getElementById(`otp_${i}`); if (box) otp += box.value; } return otp; }
    window.handleOtp = function(index, event) { let box = document.getElementById(`otp_${index}`); if (box.value && !/^\d$/.test(box.value)) box.value = ''; if (box.value && index < 5) document.getElementById(`otp_${index+1}`).focus(); };
    window.handleOtpKeydown = function(index, event) { if (event.key === 'Backspace' && !document.getElementById(`otp_${index}`).value && index > 0) { document.getElementById(`otp_${index-1}`).focus(); } };
    
    let pendingReg = null, pendingOtp = null;
    window.sendRegisterOTP = async function() {
        let name = document.getElementById('regName').value.trim(), email = document.getElementById('regEmail').value.trim(), mobile = document.getElementById('regMobile').value.trim();
        if (!name || !email || mobile.length !== 10) { showCenterPopup("Error", "All fields required", "error"); return; }
        pendingReg = { name, email, mobile: '+91' + mobile };
        pendingOtp = generateOTP();
        let sent = await sendOTPEmail(email, pendingOtp, "Registration");
        if (sent) {
            showCenterPopup("OTP Sent", `OTP sent to ${email}`, "success");
            document.getElementById('otpSection').style.display = 'block';
            document.getElementById('otp_0').focus();
        } else { showCenterPopup("Error", "Failed to send OTP", "error"); }
    };
    
    window.verifyRegisterOTP = async function() {
        if (getOtpFromBoxes() !== pendingOtp) { showCenterPopup("Error", "Invalid OTP", "error"); return; }
        let pwd = "User@" + Math.floor(Math.random() * 10000);
        try {
            let cred = await auth.createUserWithEmailAndPassword(pendingReg.email, pwd);
            await db.collection("users").doc(cred.user.uid).set({ uid: cred.user.uid, email: pendingReg.email, name: pendingReg.name, mobile: pendingReg.mobile, prlCoins: 500, address: {}, isBlocked: false });

            showLoginPage();
        } catch(e) { showCenterPopup("Error", e.message, "error"); }
    };
    window.resendRegisterOTP = function() { if (pendingReg) sendRegisterOTP(); else showCenterPopup("Error", "Please fill details first", "error"); };
    
    window.handleLogin = async function() {
        let email = document.getElementById('loginEmail').value.trim(), pwd = document.getElementById('loginPassword').value;
        try {
            let cred = await auth.signInWithEmailAndPassword(email, pwd);
            let userSnap = await db.collection("users").doc(cred.user.uid).get();
            if (userSnap.exists() && userSnap.data().isBlocked === true) {
                await auth.signOut();
                showCenterPopup("Account Blocked", "Contact: thepawanretaillimited@gmail.com", "error");
                return;
            }
            showCenterPopup("Success", "Login Successful!", "success");
        } catch(e) { showCenterPopup("Error", e.message, "error"); }
    };
