<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PRL • Customer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#f1f3f6;display:flex;justify-content:center;min-height:100vh}
        .app{max-width:450px;width:100%;background:#f1f3f6;min-height:100vh;position:relative}
        
        .header{background:linear-gradient(135deg,#0f0a1a,#1a0f2a);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#D4AF37,#F5E56B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .logo span{font-size:9px;color:#D4AF37;opacity:0.5}
        .header-actions{display:flex;gap:10px;align-items:center}
        .header-btn{color:rgba(255,255,255,0.8);font-size:18px;cursor:pointer;padding:4px;position:relative}
        .header-btn:hover{color:#D4AF37}
        .role-badge{font-size:9px;background:rgba(212,175,55,0.2);color:#D4AF37;padding:2px 10px;border-radius:10px;font-weight:600}
        
        .content{padding:12px 14px;padding-bottom:80px}
        .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        .card-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        
        .btn{padding:10px 18px;border:none;border-radius:25px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.3s}
        .btn:active{transform:scale(0.95)}
        .btn-gold{background:linear-gradient(135deg,#D4AF37,#B8860B);color:#1a0f2a;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.4)}
        .btn-secondary{background:#e8ecf0;color:#1a1a2e}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-success{background:#22c55e;color:#fff}
        .btn-warning{background:#f59e0b;color:#fff}
        .btn-primary{background:#2563eb;color:#fff}
        .btn-sm{padding:4px 12px;font-size:10px;border-radius:15px}
        .btn-block{width:100%}
        .btn-help{background:#7c3aed;color:#fff}
        .btn-help:hover{background:#6d28d9}
        .btn-complaint{background:#dc2626;color:#fff}
        .btn-complaint:hover{background:#b91c1c}
        
        .input{width:100%;padding:10px 16px;border:2px solid #e0e0e0;border-radius:25px;font-size:13px;margin:4px 0;background:#fafbfc;transition:0.3s}
        .input:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,0.1)}
        .input-sm{padding:6px 12px;font-size:11px;border-radius:15px}
        textarea.input{resize:vertical;min-height:60px;border-radius:12px}
        
        .password-wrapper{position:relative;width:100%;margin:4px 0}
        .password-wrapper .input{padding-right:50px;margin:0}
        .password-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#999;cursor:pointer;padding:4px;transition:0.3s;z-index:5}
        .password-toggle:hover{color:#D4AF37}
        
        .flex{display:flex;gap:8px;flex-wrap:wrap}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .text-center{text-align:center}
        .text-muted{color:#999;font-size:12px}
        .mt-2{margin-top:10px}
        .mb-2{margin-bottom:10px}
        
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;border-radius:12px;padding:12px 20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);border-left:4px solid #D4AF37;max-width:90%;animation:slideDown 0.3s ease}
        .toast .msg{font-weight:600;font-size:13px}
        .toast.success{border-left-color:#22c55e}
        .toast.error{border-left-color:#ef4444}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:450px;width:100%;background:#fff;border-radius:16px 16px 0 0;padding:6px 8px 10px;display:none;justify-content:space-around;box-shadow:0 -4px 20px rgba(0,0,0,0.08);z-index:50}
        .bottom-nav.show{display:flex}
        .nav-item{text-align:center;cursor:pointer;padding:4px 8px;border-radius:10px;transition:0.3s;position:relative}
        .nav-item i{font-size:20px;color:#999}
        .nav-item span{display:block;font-size:9px;color:#999;font-weight:600}
        .nav-item.active i{color:#D4AF37}
        .nav-item.active span{color:#D4AF37}
        
        .login-box{max-width:340px;margin:30px auto;padding:30px 20px;background:#fff;border-radius:16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.06)}
        .login-box .icon{font-size:56px;margin-bottom:10px}
        .login-box h2{color:#1a1a2e;margin:8px 0}
        .login-box .hint{font-size:10px;color:#999;margin-top:10px;padding:8px;background:#f8f9fa;border-radius:8px}
        .login-box .toggle-link{color:#D4AF37;cursor:pointer;font-weight:600}
        .login-box .toggle-link:hover{text-decoration:underline}
        
        .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .product-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;transition:0.3s}
        .product-card:active{transform:scale(0.97)}
        .product-card img{width:100%;height:140px;object-fit:cover;background:#f0edff}
        .product-card .info{padding:8px 10px}
        .product-card .name{font-size:12px;font-weight:600}
        .product-card .price{color:#D4AF37;font-weight:700;font-size:14px}
        .product-card .add-btn{background:#D4AF37;color:#fff;border:none;border-radius:15px;padding:2px 12px;font-size:11px;cursor:pointer;font-weight:600;width:100%;margin-top:4px}
        .product-card .add-btn:active{transform:scale(0.95)}
        
        .order-item{background:#f8f9fa;padding:10px;border-radius:10px;margin-bottom:6px;border-left:3px solid #D4AF37;cursor:pointer}
        .order-item:active{transform:scale(0.97)}
        .order-item .id{font-weight:600;font-size:11px}
        .order-item .detail{font-size:10px;color:#666}
        .order-item .status{font-size:9px;padding:2px 10px;border-radius:10px;font-weight:600;display:inline-block}
        .status-pending{background:#fef3c7;color:#d97706}
        .status-assigned{background:#dbeafe;color:#2563eb}
        .status-picked{background:#ede9fe;color:#7c3aed}
        .status-delivered{background:#d1fae5;color:#059669}
        .status-cancelled{background:#fee2e2;color:#dc2626}
        
        .empty-state{text-align:center;padding:40px 20px;color:#999}
        .empty-state .icon{font-size:56px;margin-bottom:12px;opacity:0.4}
        .empty-state .title{font-size:16px;font-weight:600;color:#666}
        .empty-state .sub{font-size:12px;color:#aaa;margin-top:4px}
        
        .error-state{text-align:center;padding:30px 20px;border:2px solid #fee2e2;border-radius:12px;background:#fef2f2}
        .error-state .icon{font-size:40px;margin-bottom:10px}
        .error-state .title{font-size:14px;font-weight:600;color:#dc2626}
        .error-state .sub{font-size:11px;color:#ef4444;margin-top:4px}
        
        .menu-sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:linear-gradient(180deg,#0f0a1a,#1a0f2a);z-index:1000;transition:left 0.3s;padding:20px;border-radius:0 20px 20px 0;box-shadow:4px 0 30px rgba(0,0,0,0.5);overflow-y:auto}
        .menu-sidebar.open{left:0}
        .menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:none;backdrop-filter:blur(4px)}
        .menu-overlay.show{display:block}
        .menu-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1px solid rgba(212,175,55,0.1);color:#e0d5c0;font-size:14px;transition:0.3s}
        .menu-item:hover{background:rgba(212,175,55,0.15);border-color:#D4AF37;transform:translateX(5px)}
        .menu-item .icon{font-size:18px}
        .menu-item.logout-item{background:rgba(239,68,68,0.12);color:#f87171;border-color:rgba(239,68,68,0.2)}
        .menu-item.logout-item:hover{background:rgba(239,68,68,0.25)}
        .menu-header{text-align:center;margin-bottom:16px;padding-bottom:16px;border-bottom:2px solid rgba(212,175,55,0.2)}
        .menu-header .avatar{width:55px;height:55px;border-radius:50%;border:3px solid #D4AF37;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px;background:rgba(255,255,255,0.05);color:#fff}
        .menu-header .name{font-weight:700;font-size:15px;color:#e0d5c0}
        .menu-header .email{font-size:11px;color:#999}
        .menu-close-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px;border-radius:50%;transition:0.3s}
        .menu-close-btn:hover{background:rgba(255,255,255,0.1);transform:rotate(90deg)}
        
        .loader-box{text-align:center;padding:30px 0}
        .loader-box .spinner{width:30px;height:30px;border:3px solid #f3f3f3;border-top:3px solid #D4AF37;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite}
        @keyframes spin{100%{transform:rotate(360deg)}}
        
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .detail-item{background:#f8f9fa;padding:10px;border-radius:8px}
        .detail-item .label{font-size:9px;color:#999;text-transform:uppercase}
        .detail-item .value{font-size:13px;font-weight:600;color:#1a1a2e}
        
        .cart-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
        .cart-item img{width:50px;height:50px;border-radius:8px;object-fit:cover}
        .cart-item .info{flex:1}
        .cart-item .name{font-weight:600;font-size:12px}
        .cart-item .price{color:#D4AF37;font-weight:700}
        .cart-item .qty-control{display:flex;align-items:center;gap:6px}
        .cart-item .qty-control button{width:24px;height:24px;border-radius:50%;border:none;background:#e8ecf0;cursor:pointer;font-weight:700}
        .cart-item .qty-control button:active{transform:scale(0.9)}
        .cart-total{font-size:16px;font-weight:800;color:#D4AF37;text-align:right;padding:10px 0;border-top:2px solid #e0e0e0}
        
        .review-item{background:#f8f9fa;padding:10px;border-radius:10px;margin-bottom:8px;border-left:3px solid #D4AF37}
        .review-item .user{font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px}
        .review-item .stars{color:#f59e0b;font-size:14px;letter-spacing:2px;margin:2px 0}
        .review-item .text{font-size:12px;color:#555;margin-top:4px;line-height:1.4}
        .review-item .review-image{max-width:100%;border-radius:8px;margin-top:6px;max-height:150px;border:1px solid #e0e0e0;width:auto}
        .review-item .date{font-size:9px;color:#999;margin-top:4px}
        .review-item .verified{color:#22c55e;font-size:9px;font-weight:600}
        
        .banner{background:linear-gradient(135deg,#D4AF37,#F5E56B);padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
        .banner .icon{font-size:28px}
        .banner .text{flex:1}
        .banner .text .title{font-weight:700;font-size:14px;color:#1a0f2a}
        .banner .text .sub{font-size:10px;color:#4a3a0a}
        
        .payment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .payment-option{background:#f8f9fa;padding:12px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.3s}
        .payment-option.active{border-color:#D4AF37;background:#fff8e1}
        .payment-option .icon{font-size:28px;margin-bottom:4px}
        .payment-option .label{font-size:10px;font-weight:600}
        
        .popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s}
        .popup-box{background:#fff;border-radius:20px;padding:30px;max-width:340px;width:90%;text-align:center;animation:scaleIn 0.3s}
        .popup-box .icon{font-size:64px;color:#22c55e}
        .popup-box .title{font-size:20px;font-weight:800;color:#1a1a2e;margin:8px 0}
        .popup-box .sub{font-size:13px;color:#666}
        .popup-box .order-id{font-size:11px;color:#999;background:#f8f9fa;padding:6px 12px;border-radius:8px;margin:8px 0;display:inline-block}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes scaleIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
        
        .help-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .help-item{background:#f8f9fa;padding:12px;border-radius:10px;text-align:center;cursor:pointer;transition:0.3s;border:1px solid #e0e0e0}
        .help-item:active{transform:scale(0.95)}
        .help-item .icon{font-size:24px;margin-bottom:4px}
        .help-item .label{font-size:10px;font-weight:600;color:#333}
        .help-item:hover{background:#e8ecf0;border-color:#D4AF37}
        
        .coupon-input{display:flex;gap:8px;align-items:center}
        .coupon-input .input{flex:1;margin:0}
        .coupon-input .btn{white-space:nowrap}
        
        .complaint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .complaint-item{background:#f8f9fa;padding:10px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.3s}
        .complaint-item.active{border-color:#dc2626;background:#fef2f2}
        .complaint-item .icon{font-size:24px}
        .complaint-item .label{font-size:10px;font-weight:600;color:#333}
        
        .tracking-steps{display:flex;flex-direction:column;gap:8px;padding:10px 0}
        .tracking-step{display:flex;align-items:center;gap:12px;padding:4px 0}
        .tracking-step .dot{width:12px;height:12px;border-radius:50%;background:#e0e0e0;flex-shrink:0;transition:0.3s}
        .tracking-step .dot.active{background:#D4AF37}
        .tracking-step .dot.completed{background:#22c55e}
        .tracking-step .info{flex:1}
        .tracking-step .info .title{font-weight:600;font-size:12px}
        .tracking-step .info .time{font-size:9px;color:#999}
        
        .order-detail-img{width:50px;height:50px;border-radius:8px;overflow:hidden;background:#f0edff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .order-detail-img img{width:100%;height:100%;object-fit:cover}
        .order-detail-img .fallback{font-size:20px;color:#999}
        .order-detail-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0f0f0}
        .order-detail-item .od-info{flex:1}
        .order-detail-item .od-info .name{font-weight:600;font-size:12px}
        .order-detail-item .od-info .qty{font-size:10px;color:#666}
        .order-detail-item .od-price{font-weight:700;color:#D4AF37;font-size:14px}
        
        .badge-pending{background:#fef3c7;color:#d97706}
        .badge-approved{background:#d1fae5;color:#059669}
        .badge-rejected{background:#fee2e2;color:#dc2626}
        .badge-active{background:#d1fae5;color:#059669}
        .badge-blocked{background:#fee2e2;color:#dc2626}
        .badge{font-size:8px;padding:2px 10px;border-radius:10px;font-weight:600;display:inline-block}
        
        .countdown-text{font-size:14px;font-weight:700;color:#dc2626;background:#fef2f2;padding:8px;border-radius:8px;margin:8px 0}
        
        .coupon-list-item{background:#f8f9fa;padding:10px;border-radius:10px;margin-bottom:6px;border-left:3px solid #22c55e;cursor:pointer}
        .coupon-list-item:active{transform:scale(0.97)}
        .coupon-list-item .code{font-weight:700;color:#D4AF37;font-size:14px}
        .coupon-list-item .detail{font-size:10px;color:#666}
        .badge-coupon{font-size:8px;padding:2px 10px;border-radius:10px;font-weight:600;display:inline-block;background:#d1fae5;color:#059669}
        
        /* Profile Styles */
        .profile-header{background:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:10px}
        .profile-header .avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#D4AF37,#B8860B);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;margin:0 auto 10px}
        .profile-header .name{font-size:18px;font-weight:700;color:#1a1a2e}
        .profile-header .phone{font-size:13px;color:#666}
        
        .profile-menu{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px}
        .profile-menu .menu-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:0.3s}
        .profile-menu .menu-item:active{background:#f5f5f5}
        .profile-menu .menu-item:last-child{border-bottom:none}
        .profile-menu .menu-item .icon{width:30px;font-size:16px;color:#D4AF37}
        .profile-menu .menu-item .text{flex:1;font-size:13px;color:#333}
        .profile-menu .menu-item .arrow{color:#ccc;font-size:12px}
        .profile-menu .menu-item .badge-count{background:#ef4444;color:#fff;font-size:9px;padding:1px 8px;border-radius:10px;margin-left:8px}
        .profile-menu .menu-item .toggle-text{font-size:11px;color:#D4AF37;font-weight:600}
        
        .profile-section-title{font-size:12px;font-weight:600;color:#999;padding:8px 0 4px 0}
        
        /* Delivery Boy Animation Styles */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(124,58,237,0.3); }
            50% { box-shadow: 0 0 20px rgba(124,58,237,0.6); }
        }
        .delivery-card { animation: slideUp 0.5s ease; }
        .delivery-avatar { animation: glow 2s infinite; }
        .delivery-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; animation: blink 1s infinite; }
        
        /* OTP Styles */
        .otp-inputs{display:flex;gap:8px;justify-content:center;margin:10px 0}
        .otp-inputs input{width:44px;height:50px;text-align:center;font-size:20px;font-weight:700;border:2px solid #e0e0e0;border-radius:10px;background:#fafbfc;transition:0.3s}
        .otp-inputs input:focus{outline:none;border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,0.1)}
        .otp-inputs input.filled{border-color:#22c55e;background:#f0fdf4}
        .otp-timer{font-size:12px;color:#999;text-align:center;margin:4px 0}
        .otp-timer .time{color:#D4AF37;font-weight:700}
        .otp-resend{font-size:12px;color:#D4AF37;cursor:pointer;font-weight:600}
        .otp-resend:hover{text-decoration:underline}
        .otp-resend.disabled{color:#999;cursor:not-allowed}
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="logo">PRL<span> 🛒</span></div>
        <div class="header-actions">
            <span class="role-badge" id="roleBadge">Customer</span>
            <div class="header-btn" onclick="toggleMenu()"><i class="fas fa-user"></i></div>
        </div>
    </div>
    <div class="content" id="pageContent"><div class="loader-box"><div class="spinner"></div></div></div>
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="navigateTo('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="navigateTo('cart')"><i class="fas fa-shopping-cart"></i><span>Cart</span></div>
        <div class="nav-item" onclick="navigateTo('orders')"><i class="fas fa-box"></i><span>Orders</span></div>
        <div class="nav-item" onclick="navigateTo('profile')"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>
</div>
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
<div class="menu-sidebar" id="menuSidebar">
    <button class="menu-close-btn" onclick="closeMenu()"><i class="fas fa-times"></i></button>

function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

function getOTPExpiry() {
    return Date.now() + 5 * 60 * 1000;
}

async function sendOTPEmail(email, otp, name = 'Customer') {
    try {
        const templateParams = {
            to_email: email,
            to_name: name,
            otp: otp,
            subject: 'PRL - Your OTP Code'
        };
        const response = await emailjs.send(
            EMAILJS_CONFIG.SERVICE_ID,
            EMAILJS_CONFIG.TEMPLATE_ID,
            templateParams
        );
        console.log('Email sent:', response);
        return true;
    } catch(e) {
        console.error('Email send error:', e);
        showToast('Failed to send OTP. Please try again.', 'error');
        return false;
    }
}

function renderOTPPage(email, name, isRegister) {

        otp: otpCode,
        email: email,
        createdAt: new Date().toISOString(),
        expiresAt: new Date(otpExpiryTime).toISOString()
    }).catch(e => console.log('Save OTP error:', e));
    
    sendOTPEmail(email, otpCode, name);
    
    render(`
        <div class="login-box" style="max-width:340px;margin:20px auto;">

            <h2>Verify Your Email</h2>

                <input type="text" maxlength="1" id="otp0" oninput="otpInput(this,0)" onkeydown="otpBackspace(event,0)">
                <input type="text" maxlength="1" id="otp1" oninput="otpInput(this,1)" onkeydown="otpBackspace(event,1)">
                <input type="text" maxlength="1" id="otp2" oninput="otpInput(this,2)" onkeydown="otpBackspace(event,2)">
                <input type="text" maxlength="1" id="otp3" oninput="otpInput(this,3)" onkeydown="otpBackspace(event,3)">
                <input type="text" maxlength="1" id="otp4" oninput="otpInput(this,4)" onkeydown="otpBackspace(event,4)">
                <input type="text" maxlength="1" id="otp5" oninput="otpInput(this,5)" onkeydown="otpBackspace(event,5)">
            </div>
            
            <div class="otp-timer" id="otpTimer">⏳ <span class="time" id="timerDisplay">05:00</span> remaining</div>
            
            <button class="btn btn-gold btn-block" onclick="verifyOTP()"><i class="fas fa-check"></i> Verify OTP</button>
            
            <div style="margin-top:8px;font-size:12px;color:#666;">
                Didn't receive OTP? 
                <span class="otp-resend" id="resendBtn" onclick="resendOTP()">Resend OTP</span>
            </div>
            <div style="margin-top:8px;font-size:11px;color:#999;">
                <i class="fas fa-info-circle"></i> OTP valid for 5 minutes
            </div>
        </div>
    `);
    
    startOTPTimer();
    document.getElementById('otp0').focus();
}

function otpInput(el, index) {
    const val = el.value;
    if (val.length === 1 && index < 5) {
        document.getElementById(`otp${index+1}`).focus();
    }
}

function otpBackspace(event, index) {
    if (event.key === 'Backspace' && index > 0 && !event.target.value) {
        document.getElementById(`otp${index-1}`).focus();
    }
}

function getOTPValue() {
    let otp = '';
    for (let i = 0; i < 6; i++) {
        otp += document.getElementById(`otp${i}`).value;
    }
    return otp;
}

function startOTPTimer() {
    if (otpTimerInterval) clearInterval(otpTimerInterval);
    otpTimerInterval = setInterval(() => {
        const now = Date.now();
        const diff = otpExpiryTime - now;
        if (diff <= 0) {
            clearInterval(otpTimerInterval);
            document.getElementById('timerDisplay').textContent = '00:00';
            document.getElementById('resendBtn').classList.remove('disabled');
            showToast('OTP expired. Please resend.', 'error');
            return;
        }
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        document.getElementById('timerDisplay').textContent = 
            `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }, 1000);
}

async function verifyOTP() {
    const enteredOTP = getOTPValue();
    if (enteredOTP.length !== 6) {
        showToast('Enter complete 6-digit OTP', 'error');
        return;
    }
    if (Date.now() > otpExpiryTime) {
        showToast('OTP expired. Please resend.', 'error');
        return;
    }
    try {
        const doc = await db.collection('otp').doc(otpEmail).get();
        if (!doc.exists) {
            showToast('Invalid OTP. Please try again.', 'error');
            return;
        }
        const data = doc.data();
        if (data.otp === enteredOTP) {
            otpVerified = true;
            showToast('✅ OTP Verified Successfully!', 'success');
            if (isRegisterMode) {
                completeRegistration();
            } else {
                completeLogin();
            }
            await db.collection('otp').doc(otpEmail).delete();
        } else {
            showToast('❌ Invalid OTP. Please try again.', 'error');
        }
    } catch(e) {
        showToast('Error verifying OTP: ' + e.message, 'error');
    }
}

async function resendOTP() {
    if (Date.now() < otpExpiryTime) {
        showToast('Current OTP is still valid. Please wait.', 'warning');
        return;
    }
    otpCode = generateOTP();
    otpExpiryTime = getOTPExpiry();
    await db.collection('otp').doc(otpEmail).set({
        otp: otpCode,
        email: otpEmail,
        createdAt: new Date().toISOString(),
        expiresAt: new Date(otpExpiryTime).toISOString()
    });
    await sendOTPEmail(otpEmail, otpCode, 'Customer');
    startOTPTimer();
    document.getElementById('resendBtn').classList.add('disabled');
    showToast('✅ OTP resent successfully!', 'success');
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    if (!email || !pwd) { showToast('Enter email & password', 'error'); return; }
    try {
        const userCred = await auth.signInWithEmailAndPassword(email, pwd);
        currentUser = userCred.user;
        const doc = await db.collection('users').doc(currentUser.uid).get();
        const name = doc.exists ? doc.data().name : 'Customer';
        renderOTPPage(email, name, false);
    } catch(e) {
        if (e.code === 'auth/user-not-found') {
            showToast('Account not found. Please register first.', 'error');
        } else if (e.code === 'auth/wrong-password') {
            showToast('Wrong password. Please try again.', 'error');
        } else {
            showToast('Login failed: ' + e.message, 'error');
        }
    }
}

async function completeLogin() {
    try {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if (doc.exists) {
            userData = doc.data();
            if (userData.role !== 'customer') {
                showToast('Customer access only!', 'error');
                await auth.signOut();
                showLogin();
                return;
            }
            if (userData.blocked) {
                showToast('🚫 Your account is blocked!', 'error');
                await auth.signOut();
                showLogin();
                return;
            }
            updateMenu();
            showBottomNav(true);
            navigateTo('home');
            showToast('✅ Login successful! Welcome back!', 'success');

        showToast('Error: ' + e.message, 'error');

        const cred = await auth.createUserWithEmailAndPassword(email, pwd);

        renderOTPPage(email, name, true);

            showToast('Email already registered. Please login.', 'error');

function showBlockPopup(message) {
    const popup = document.createElement('div');
    popup.className = 'popup-overlay';
    popup.id = 'blockPopup';
    popup.innerHTML = `
        <div class="popup-box" style="border:3px solid #ef4444;">
            <div class="icon" style="color:#ef4444;">🚫</div>
            <div class="title" style="color:#dc2626;">Account Blocked</div>
            <div class="sub" id="blockMessage" style="font-size:14px;font-weight:600;color:#dc2626;">${message}</div>
            <div style="font-size:12px;color:#666;margin:8px 0;">Contact admin for support</div>
            <button class="btn btn-danger btn-block" onclick="this.closest('.popup-overlay').remove()">OK</button>
        </div>
    `;
    document.body.appendChild(popup);
}

function startBlockCountdown(unblockTime) {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        const now = new Date();
        const diffMs = unblockTime - now;
        if (diffMs <= 0) {
            clearInterval(countdownInterval);
            db.collection('users').doc(currentUser.uid).update({
                blocked: false, blockType: null, blockDuration: null, unblockAt: null
            }).then(() => {
                const popup = document.getElementById('blockPopup');
                if (popup) popup.remove();
                showToast('✅ Account unblocked!', 'success');
                location.reload();
            });
            return;
        }
        const hours = Math.floor(diffMs / (1000 * 60 * 60));
        const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);
        const msgEl = document.getElementById('blockMessage');
        if (msgEl) {
            msgEl.textContent = `⏳ Blocked for ${hours}h ${minutes}m ${seconds}s remaining`;
        }
    }, 1000);
}

async function saveRecentView(productId) {
    if (!currentUser) return;
    const p = products.find(x => x.id === productId);
    if (!p) return;
    try {
        const existing = await db.collection('recentViews')
            .where('userId', '==', currentUser.uid)
            .where('productId', '==', productId).get();
        if (!existing.empty) {
            await db.collection('recentViews').doc(existing.docs[0].id).update({ viewedAt: new Date().toISOString() });
        } else {
            await db.collection('recentViews').add({
                userId: currentUser.uid, productId: productId, name: p.name,
                price: p.price, image: p.image || '', viewedAt: new Date().toISOString()
            });
        }
    } catch(e) { console.log('Save recent view error:', e); }
}

async function getRecentViews() {
    if (!currentUser) return [];
    try {
        const snap = await db.collection('recentViews').where('userId', '==', currentUser.uid).get();
        return snap.docs.map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => new Date(b.viewedAt) - new Date(a.viewedAt)).slice(0, 6);
    } catch(e) { return []; }
}

async function loadRecentViews() {
    const container = document.getElementById('recentViewsContainer');
    if (!container) return;
    const recent = await getRecentViews();
    if (recent.length === 0) {
        container.innerHTML = `<div class="empty-state" style="padding:10px;"><div class="icon" style="font-size:24px;">👀</div><div class="title" style="font-size:12px;">No recent views</div></div>`;
        return;
    }
    container.innerHTML = recent.map(r => `
        <div class="product-card" onclick="viewProduct('${r.productId}')" style="cursor:pointer;">
            <img src="${r.image || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
            <div class="info">
                <div class="name">${r.name}</div>

            </div>
        </div>

}

// ============================================================
// 🔥 LOAD PRODUCT REVIEWS
// ============================================================
async function loadProductReviews(productId) {
    const container = document.getElementById('reviewsContainer');
    if (!container) { setTimeout(() => loadProductReviews(productId), 300); return; }
    container.innerHTML = `<div class="loader-box" style="padding:10px;"><div class="spinner" style="width:20px;height:20px;"></div><p style="font-size:10px;color:#999;margin-top:4px;">Loading reviews...</p></div>`;
    try {
        const snap = await db.collection('reviews').where('productId', '==', productId).get();
        const reviews = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (reviews.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:20px;color:#999;"><div style="font-size:32px;margin-bottom:8px;">📝</div><div style="font-size:14px;font-weight:600;color:#666;">No reviews yet</div><div style="font-size:11px;color:#aaa;">Be the first to review this product!</div></div>`;
            return;
        }
        let totalRating = 0;
        reviews.forEach(r => totalRating += (r.rating || 5));
        const avgRating = (totalRating / reviews.length).toFixed(1);
        const fullStars = Math.round(avgRating);
        let html = `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #e0e0e0;margin-bottom:8px;"><span style="font-size:18px;font-weight:800;color:#D4AF37;">${avgRating}</span><span style="color:#f59e0b;font-size:16px;">${'★'.repeat(fullStars)}${'☆'.repeat(5-fullStars)}</span><span style="font-size:11px;color:#999;">(${reviews.length} reviews)</span></div>`;
        reviews.forEach(r => {
            const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
            const rating = r.rating || 5;
            html += `<div class="review-item"><div style="display:flex;justify-content:space-between;align-items:center;"><div class="user">${r.userName || 'Anonymous'} ${r.isVerified ? '<span class="verified">✅ Verified</span>' : ''}</div></div><div class="stars">${'★'.repeat(rating)}${'☆'.repeat(5-rating)}</div><div class="text">${r.text || ''}</div>${r.imageUrl ? `<img src="${r.imageUrl}" class="review-image" alt="Review image" onerror="this.style.display='none'">` : ''}<div class="date">${date}</div></div>`;
        });
        container.innerHTML = html;
    } catch(e) {
        container.innerHTML = `<div style="text-align:center;padding:15px;border:2px solid #fee2e2;border-radius:12px;background:#fef2f2;"><div style="font-size:24px;margin-bottom:4px;">⚠️</div><div style="font-size:12px;font-weight:600;color:#dc2626;">Error loading reviews</div><button class="btn btn-secondary btn-sm mt-2" onclick="loadProductReviews('${productId}')">🔄 Retry</button></div>`;
    }
}

async function addToCart(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) { showToast('Product not found', 'error'); return; }
    if (userData?.blocked) { showToast('🚫 Your account is blocked!', 'error'); return; }
    try {
        const existing = await db.collection('cart').where('userId', '==', currentUser.uid).where('productId', '==', productId).get();
        if (!existing.empty) {
            const doc = existing.docs[0];
            await db.collection('cart').doc(doc.id).update({ quantity: doc.data().quantity + 1 });
        } else {
            await db.collection('cart').add({
                userId: currentUser.uid, productId: p.id, name: p.name,
                price: p.price, image: p.image || '', quantity: 1,
                addedAt: new Date().toISOString()
            });
        }
        showToast('✅ Added to cart!', 'success');
        setTimeout(() => navigateTo('cart'), 500);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

// 🔥 CART
// ============================================================
function renderCart() {
    return `<div class="card"><div class="card-title">🛒 Your Cart</div></div><div id="cartContainer"><div class="loader-box"><div class="spinner"></div></div></div>`;
}

async function loadCart() {
    const container = document.getElementById('cartContainer');
    if (!container) return;
    try {
        const snap = await db.collection('cart').where('userId', '==', currentUser.uid).get();
        cartItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (cartItems.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><div class="title">Cart is empty</div></div>`;
            return;
        }
        let html = '', total = 0;
        cartItems.forEach(item => {
            total += item.price * item.quantity;
            html += `<div class="cart-item"><img src="${item.image || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'"><div class="info"><div class="name">${item.name}</div><div class="price">₹${item.price}</div></div><div class="qty-control"><button onclick="updateCartQty('${item.id}', -1)">−</button><span>${item.quantity}</span><button onclick="updateCartQty('${item.id}', 1)">+</button></div><button class="btn btn-sm btn-danger" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button></div>`;
        });
        html += `<div class="cart-total">Total: ₹${total}</div>`;
        html += `<button class="btn btn-secondary btn-sm" onclick="navigateTo('coupons')">🎫 View Coupons</button>`;
        html += `<button class="btn btn-gold btn-block" onclick="navigateTo('address')"><i class="fas fa-arrow-right"></i> Proceed to Address</button>`;
        container.innerHTML = html;
    } catch(e) { container.innerHTML = `<div class="error-state"><div class="icon">⚠️</div><div class="title">${e.message}</div></div>`; }
}

async function updateCartQty(cartId, delta) {
    const item = cartItems.find(x => x.id === cartId);
    if (!item) return;
    const newQty = item.quantity + delta;
    if (newQty <= 0) { removeFromCart(cartId); return; }
    try {
        await db.collection('cart').doc(cartId).update({ quantity: newQty });
        loadCart();
    } catch(e) { showToast('Error updating cart', 'error'); }
}

async function removeFromCart(cartId) {
    if (!confirm('Remove item?')) return;
    try {
        await db.collection('cart').doc(cartId).delete();
        showToast('Removed from cart');
        loadCart();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function renderCheckout() {

    if (finalTotal < 0) finalTotal = 0;
    let itemsHtml = cartItems.map(item => `

            ${itemsHtml}
            <div style="border-top:2px solid #e0e0e0;padding-top:8px;margin-top:6px;">

                <div style="margin:8px 0;">
                    <div class="coupon-input">
                        <input class="input input-sm" id="couponInput" placeholder="Enter coupon code" value="${couponCode}">
                        <button class="btn btn-sm btn-gold" onclick="applyCoupon()">Apply</button>
                        <button class="btn btn-sm btn-secondary" onclick="navigateTo('coupons')">📋</button>
                    </div>
                    ${appliedCoupon ? `<div style="font-size:10px;color:#22c55e;">✅ Coupon applied! -₹${discount.toFixed(0)}</div>` : ''}
                </div>
                <div class="flex-between" style="font-size:16px;font-weight:800;color:#D4AF37;border-top:2px solid #e0e0e0;padding-top:8px;">
                    <span>Total</span>
                    <span>₹${finalTotal.toFixed(0)}</span>
                </div>
            </div>
            <div style="font-weight:600;font-size:13px;margin:8px 0;">📍 Delivery Address</div>
            <div style="font-size:12px;color:#666;background:#f8f9fa;padding:8px;border-radius:8px;">${userData?.address || 'No address set'}</div>

            <button class="btn btn-gold btn-block mt-2" onclick="navigateTo('payment')"><i class="fas fa-credit-card"></i> Proceed to Payment</button>
            <button class="btn btn-secondary btn-block mt-2" onclick="navigateTo('cart')">← Back to Cart</button>
        </div>
    `;
}

async function applyCoupon() {
    const code = document.getElementById('couponInput').value.trim().toUpperCase();
    if (!code) { showToast('Enter coupon code', 'error'); return; }
    try {
        const snap = await db.collection('coupons').where('code', '==', code).where('active', '==', true).get();
        if (snap.empty) { showToast('❌ Invalid coupon', 'error'); return; }
        const coupon = snap.docs[0].data();
        if (!coupon.isPublic) { showToast('❌ Coupon not available', 'error'); return; }
        const total = cartItems.reduce((sum, i) => sum + i.price * i.quantity, 0);
        if (total < (coupon.minAmount || 0)) {
            showToast(`❌ Minimum order ₹${coupon.minAmount} required`, 'error');
            return;
        }
        appliedCoupon = { ...coupon, id: snap.docs[0].id };
        showToast(`✅ Coupon applied!`, 'success');
        navigateTo('checkout');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function selectPayment(method) {
    selectedPayment = method;
    document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`payment${method}`);
    if (el) el.classList.add('active');
    document.getElementById('giftCardSection').style.display = method === 'GIFT' ? 'block' : 'none';
    const status = document.getElementById('paymentStatus');
    const labels = { 'UPI': 'UPI Payment', 'QR': 'QR Code Payment', 'COD': 'Cash on Delivery', 'GIFT': 'Gift Card' };
    if (status) status.innerHTML = `<div style="color:#22c55e;font-weight:600;">✅ Selected: ${labels[method]}</div>`;
}

async function confirmPayment() {
    if (!selectedPayment) { showToast('Select payment method', 'error'); return; }
    if (cartItems.length === 0) { showToast('Cart is empty', 'error'); return; }
    if (!userData?.address) { showToast('Add address first', 'error'); return; }
    if (userData?.blocked) { showToast('🚫 Your account is blocked!', 'error'); return; }
    
    if (selectedPayment === 'GIFT') {
        const code = document.getElementById('giftCode').value.trim();
        const pin = document.getElementById('giftPassword').value.trim();
        if (code.length !== 16) { showToast('Enter valid 16-digit gift code', 'error'); return; }
        if (pin.length !== 6) { showToast('Enter valid 6-digit PIN', 'error'); return; }
        try {
            const snap = await db.collection('giftCards').where('code', '==', code).where('pin', '==', pin).get();
            if (snap.empty) { showToast('❌ Invalid gift card', 'error'); return; }
            const card = snap.docs[0].data();
            if (!card.active) { showToast('❌ Gift card used', 'error'); return; }
            await db.collection('giftCards').doc(snap.docs[0].id).update({
                active: false, usedBy: currentUser.uid, usedAt: new Date().toISOString()
            });
            showToast('✅ Gift card applied!', 'success');
        } catch(e) { showToast('Error: ' + e.message, 'error'); return; }
    }
    
    const total = cartItems.reduce((sum, i) => sum + i.price * i.quantity, 0);
    let deliveryCharge = isFirstOrder ? 0 : 40;
    let discount = 0;
    if (appliedCoupon) {
        discount = Math.min(total * (appliedCoupon.discount || 0.1), appliedCoupon.maxDiscount || 99999);
    }
    let finalTotal = total - discount + deliveryCharge;
    if (finalTotal < 0) finalTotal = 0;
    
    try {
        const orderRef = await db.collection('orders').add({
            userId: currentUser.uid,
            userEmail: userData?.email || '',
            userName: userData?.name || '',
            items: cartItems.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, image: i.image, productId: i.productId })),
            total: finalTotal,
            subtotal: total,
            discount: discount,
            deliveryCharge: deliveryCharge,
            coupon: appliedCoupon?.code || '',
            isFirstOrder: isFirstOrder,
            address: userData?.address || '',
            phone: userData?.phone || '',
            paymentMethod: selectedPayment,
            paymentStatus: selectedPayment === 'COD' ? 'pending' : 'completed',
            status: 'pending',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        });
        await db.collection('users').doc(currentUser.uid).update({ orderCount: firebase.firestore.FieldValue.increment(1) });
        for (const item of cartItems) { await db.collection('cart').doc(item.id).delete(); }
        cartItems = [];
        const usedCoupon = appliedCoupon;
        appliedCoupon = null;
        showOrderSuccessPopup(orderRef.id, finalTotal, usedCoupon, isFirstOrder);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function showOrderSuccessPopup(orderId, amount, coupon, isFirstOrder) {
    const popup = document.createElement('div');
    popup.className = 'popup-overlay';
    popup.innerHTML = `
        <div class="popup-box" style="border:3px solid #22c55e;">
            <div class="icon" style="color:#22c55e;">✅</div>
            <div class="title" style="color:#22c55e;">Order Placed Successfully!</div>
            <div class="order-id" style="background:#f0fdf4;color:#166534;">Order #${orderId.substring(0,12)}</div>
            <div class="sub" style="font-size:16px;font-weight:700;color:#1a1a2e;">Total: ₹${amount.toFixed(0)}</div>
            ${coupon ? `<div class="sub" style="color:#22c55e;">🎫 Coupon ${coupon.code} applied</div>` : ''}
            ${isFirstOrder ? `<div class="sub" style="color:#22c55e;">🚚 Free delivery on first order!</div>` : ''}
            <div style="display:flex;gap:8px;margin-top:12px;">
                <button class="btn btn-gold btn-block" onclick="this.closest('.popup-overlay').remove();navigateTo('orderDetail','${orderId}')"><i class="fas fa-eye"></i> View Order</button>
                <button class="btn btn-secondary btn-block" onclick="this.closest('.popup-overlay').remove();navigateTo('home')"><i class="fas fa-home"></i> Home</button>

async function loadOrders() {
    const container = document.getElementById('ordersContainer');

        orders = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (orders.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="title">No orders yet</div><div class="sub">Shop now!</div></div>`;

                    ${o.status === 'picked' ? `<div class="detail" style="color:#7c3aed;">📦 Out for delivery!</div>` : ''}

// 🔥 ORDER DETAIL + DELIVERY BOY DETAILS (NO TRACKING)

function renderOrderDetail(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (!order) {
        return `<div class="card"><div class="loader-box"><div class="spinner"></div></div></div>
        <script>
            setTimeout(() => {
                db.collection('orders').doc('${orderId}').get().then(doc => {
                    if(doc.exists) {
                        const data = doc.data();
                        const o = { id: doc.id, ...data };
                        const idx = orders.findIndex(x => x.id === o.id);
                        if(idx === -1) orders.push(o);
                        navigateTo('orderDetail', o.id);
                    }
                });
            }, 500);
        <\/script>`;
    }
    
    const statuses = ['pending', 'assigned', 'picked', 'delivered'];
    const statusLabels = ['Pending', 'Assigned', 'Picked', 'Delivered'];
    const statusIcons = ['📦', '✅', '📦', '🏠'];
    const idx = statuses.indexOf(order.status) !== -1 ? statuses.indexOf(order.status) : 0;
    
    let trackingHtml = statuses.map((s, i) => {
        let dotClass = '';
        if (i < idx) dotClass = 'completed';
        else if (i === idx && order.status !== 'cancelled') dotClass = 'active';
        return `<div class="tracking-step"><div class="dot ${dotClass}"></div><div class="info"><div class="title">${statusIcons[i]} ${statusLabels[i]}</div><div class="time">${i === idx && order.status !== 'cancelled' ? 'Current' : ''}</div></div></div>`;
    }).join('');
    
    let itemsHtml = order.items ? order.items.map(item => `
        <div class="order-detail-item">
            <div class="order-detail-img">${item.image ? `<img src="${item.image}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>📦</span>'">` : `<span class="fallback">📦</span>`}</div>
            <div class="od-info"><div class="name">${item.name}</div><div class="qty">Qty: ${item.quantity} × ₹${item.price}</div></div>
            <div class="od-price">₹${item.price * item.quantity}</div>

    const isPending = order.status === 'pending';
    const isAssigned = order.status === 'assigned' || order.status === 'picked';
    const isDelivered = order.status === 'delivered';
    const isCancelled = order.status === 'cancelled';

            <div class="card-title">📦 Order Details</div>
            <div class="detail-grid">
                <div class="detail-item"><div class="label">Order ID</div><div class="value">${order.id.substring(0,12)}</div></div>
                <div class="detail-item"><div class="label">Status</div><div class="value"><span class="status status-${order.status}">${order.status}</span></div></div>
                <div class="detail-item"><div class="label">Total</div><div class="value" style="color:#D4AF37;">₹${order.total}</div></div>
                <div class="detail-item"><div class="label">Payment</div><div class="value">${order.paymentMethod || 'COD'}</div></div>
                ${order.discount ? `<div class="detail-item"><div class="label">Discount</div><div class="value" style="color:#22c55e;">-₹${order.discount}</div></div>` : ''}
                ${order.isFirstOrder ? `<div class="detail-item" style="grid-column:span 2;"><div class="label">🎉 First Order</div><div class="value" style="color:#22c55e;">Free Delivery</div></div>` : ''}
                <div class="detail-item"><div class="label">Date</div><div class="value">${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : ''}</div></div>
                <div class="detail-item" style="grid-column:span 2;"><div class="label">Address</div><div class="value">${order.address || 'N/A'}</div></div>
                <div class="detail-item" style="grid-column:span 2;"><div class="label">Phone</div><div class="value">${order.phone || 'N/A'}</div></div>
                ${order.deliveryPartner ? `
                    <div class="detail-item" style="grid-column:span 2;">
                        <div class="label">Delivery Partner</div>
                        <div class="value" style="font-size:11px;color:#666;">Assigned</div>
                    </div>
                ` : ''}
            </div>
            
            <div style="margin-top:10px;">
                <div style="font-weight:600;font-size:13px;margin-bottom:6px;">📌 Tracking</div>
                <div class="tracking-steps">${trackingHtml}</div>
                ${isPending ? `<div style="font-size:11px;color:#d97706;background:#fef3c7;padding:6px 10px;border-radius:8px;margin-top:6px;">⏳ Waiting for a delivery partner to accept your order</div>` : ''}

            </div>
            <div style="background:#fee2e2;padding:8px;border-radius:8px;font-size:11px;color:#dc2626;margin-bottom:10px;">

            </div>
        </div>
    `;
}

async function confirmCancelOrder(orderId) {
    try {
        const doc = await db.collection('orders').doc(orderId).get();
        if (!doc.exists) { showToast('Order not found', 'error'); return; }
        if (doc.data().status !== 'pending') { 
            showToast('❌ Cannot cancel - Status: ' + doc.data().status, 'error'); 
            return; 
        }
        await db.collection('orders').doc(orderId).update({ 
            status: 'cancelled', 
            updatedAt: new Date().toISOString() 
        });
        showToast('❌ Order cancelled successfully');
        const idx = orders.findIndex(o => o.id === orderId);
        if (idx !== -1) orders[idx].status = 'cancelled';
        navigateTo('orders');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

    const status = document.getElementById('complaintStatus');
    const labels = { 'damage': '💔 Damaged', 'missing': '🔍 Missing', 'wrong': '❌ Wrong', 'other': '📝 Other' };
    if (status) status.innerHTML = `<span style="color:#dc2626;font-weight:600;">✅ ${labels[type]}</span>`;

async function submitComplaint(orderId) {

function renderReview(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (!order) return `<div class="card"><p>Order not found</p></div>`;
    const productName = order.items?.[0]?.name || 'Product';
    return `
        <div class="card">
            <div class="card-title">⭐ Write a Review</div>
            <p class="text-muted">Review: <strong>${productName}</strong></p>
            <div style="margin:10px 0;">
                <div style="font-weight:600;font-size:12px;">Rating</div>
                <div style="display:flex;gap:4px;font-size:28px;cursor:pointer;" id="starRating">
                    ${[1,2,3,4,5].map(i => `<span onclick="setRating(${i})" id="star${i}" style="color:#ddd;">★</span>`).join('')}
                </div>
            </div>
            <textarea class="input" id="reviewText" placeholder="Write your review..." rows="3"></textarea>
            <div style="margin:8px 0;"><div style="font-weight:600;font-size:12px;">Upload Image (Optional)</div><input type="file" id="reviewImage" accept="image/*" style="width:100%;padding:6px;border:1px solid #e0e0e0;border-radius:8px;"></div>
            <button class="btn btn-gold btn-block" onclick="submitReview('${orderId}')">Submit Review</button>
            <button class="btn btn-secondary btn-block mt-2" onclick="navigateTo('orderDetail', '${orderId}')">← Back</button>
        </div>
    `;
}

function setRating(val) {
    selectedRating = val;
    for (let i = 1; i <= 5; i++) {
        document.getElementById(`star${i}`).style.color = i <= val ? '#f59e0b' : '#ddd';
    }
}

async function submitReview(orderId) {
    if (!selectedRating) { showToast('Select rating', 'error'); return; }
    const text = document.getElementById('reviewText').value.trim();
    if (!text) { showToast('Write a review', 'error'); return; }
    const order = orders.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    const productId = order.items?.[0]?.productId;
    const productName = order.items?.[0]?.name || 'Product';
    if (!productId || productId === 'unknown') { showToast('Product ID missing.', 'error'); return; }
    try {
        const existing = await db.collection('reviews').where('userId', '==', currentUser.uid).where('orderId', '==', orderId).get();
        if (!existing.empty) { showToast('❌ You already reviewed this order!', 'error'); return; }
    } catch(e) { /* ignore */ }
    try {
        let imageUrl = '';
        const fileInput = document.getElementById('reviewImage');
        if (fileInput && fileInput.files && fileInput.files[0]) { imageUrl = 'https://via.placeholder.com/200'; }
        await db.collection('reviews').add({
            productId: productId, productName: productName, userId: currentUser.uid,
            userName: userData?.name || 'Customer', orderId: orderId, text: text,
            rating: selectedRating, imageUrl: imageUrl, isVerified: true,
            createdAt: new Date().toISOString()
        });
        showToast('✅ Review submitted! Thank you!', 'success');
        setTimeout(() => { viewProduct(productId); }, 500);
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function changePasswordPage() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd || !confirmPwd) { showToast('Fill all fields', 'error'); return; }
    if (newPwd.length < 6) { showToast('Password min 6 chars', 'error'); return; }
    if (newPwd !== confirmPwd) { showToast('Passwords do not match', 'error'); return; }
    try {
        const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPwd);
        await currentUser.reauthenticateWithCredential(cred);
        await currentUser.updatePassword(newPwd);
        await db.collection('users').doc(currentUser.uid).update({ password: newPwd });
        showToast('✅ Password changed successfully!', 'success');
        navigateTo('profile');
    } catch(e) {
        if (e.code === 'auth/wrong-password') {
            showToast('Current password is incorrect', 'error');
        } else {
            showToast('Error: ' + e.message, 'error');
        }
    }
}

// 🔥 AUTH STATE
// ============================================================
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userData = doc.data();
                if (userData.blocked) {
                    let blockMessage = '🚫 Your account has been blocked!';
                    if (userData.blockType === 'timed' && userData.unblockAt) {
                        const unblockTime = new Date(userData.unblockAt);
                        const now = new Date();
                        const diffMs = unblockTime - now;
                        if (diffMs > 0) {
                            const hours = Math.floor(diffMs / (1000 * 60 * 60));
                            const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                            blockMessage = `⏳ Blocked for ${hours}h ${minutes}m remaining`;
                            showBlockPopup(blockMessage);
                            startBlockCountdown(unblockTime);
                            await auth.signOut();
                            return;
                        } else {
                            await db.collection('users').doc(user.uid).update({
                                blocked: false, blockType: null, blockDuration: null, unblockAt: null
                            });
                            userData.blocked = false;
                            showToast('✅ Your account has been unblocked!', 'success');
                        }
                    } else {
                        showBlockPopup(blockMessage);
                        await auth.signOut();
                        return;
                    }
                }
                if (userData.role !== 'customer') {
                    showToast('Customer access only!', 'error');
                    await auth.signOut();
                    showLogin();
                    return;
                }
                updateMenu();
                showBottomNav(true);
                navigateTo('home');
            } else {
                showToast('Profile not found', 'error');
                await auth.signOut();
                showLogin();
            }
        } catch(e) { showLogin(); }
    } else {
        currentUser = null;
        userData = null;
        if (countdownInterval) clearInterval(countdownInterval);
        if (otpTimerInterval) clearInterval(otpTimerInterval);
        showBottomNav(false);
        showLogin();
    }
});
